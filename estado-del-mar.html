    estado-del-mar.10-topic-detail.js      -> la pantalla de una ventana abierta

function computeLevel(total, levels) {
  return levels.find(l => total >= l.min && total <= l.max) || levels[levels.length - 1];
}

function formatDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('es-AR', { day: 'numeric', month: 'long', year: 'numeric' });
}

function slugify(str) {
  return str.toLowerCase().normalize('NFD').replace(new RegExp('[' + String.fromCharCode(768) + '-' + String.fromCharCode(879) + ']', 'g'), '')
    .replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '') || ('ventana-' + Date.now());
}

function Reveal({ children, className }) {
  const ref = React.useRef(null);
  const [visible, setVisible] = React.useState(false);
  React.useEffect(() => {
    const obs = new IntersectionObserver(entries => {
      if (entries[0].isIntersecting) { setVisible(true); obs.disconnect(); }
    }, { threshold: 0.15 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return (
    <div ref={ref} className={(className || '') + ' reveal' + (visible ? ' visible' : '')}>
      {children}
    </div>
  );
}

/* ===== estado-del-mar.03-diagnostic-quiz.js ===== */

function DiagnosticQuiz({ topic, onComplete }) {
  const [answers, setAnswers] = React.useState([]);
  const [current, setCurrent] = React.useState(0);
  const [result, setResult] = React.useState(null);

  function choose(value) {
    const next = [...answers, value];
    setAnswers(next);
    if (current + 1 < topic.questions.length) {
      setCurrent(current + 1);
    } else {
      const total = next.reduce((a, b) => a + b, 0);
      const level = computeLevel(total, topic.levels);
      setResult({ total, level });
      if (onComplete) onComplete(level);
    }
  }

  function restart() {
    setAnswers([]);
    setCurrent(0);
    setResult(null);
  }

  if (result) {
    return (
      <div className="animate-fadein max-w-xl mx-auto text-center py-6">
        <p className="uppercase tracking-widest text-xs text-sea-500 font-semibold mb-2">Tu check-in de hoy</p>
        <h3 className="font-serif text-3xl md:text-4xl font-semibold text-sea-900 mb-4">{result.level.label}</h3>
        <p className="text-sea-700 leading-relaxed mb-6">{result.level.message}</p>
        <p className="text-xs text-sea-400 mb-6 italic">Esto es una orientación para elegir contenido, no un diagnóstico clínico. Si algo de esto te desborda, una consulta con un profesional siempre suma.</p>
        <button onClick={restart} className="btn btn-soft btn-sm">Volver a hacer el check-in</button>
      </div>
    );
  }

  const q = topic.questions[current];

  return (
    <div className="max-w-xl mx-auto py-4">
      <div className="mb-6"><ProgressDots count={topic.questions.length} current={current} /></div>
      <p className="text-center text-xs text-sea-400 mb-2">Pregunta {current + 1} de {topic.questions.length}</p>
      <h3 className="text-center font-serif text-2xl md:text-3xl text-sea-900 mb-8 px-2">{q.text}</h3>
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
        {LIKERT.map(opt => (
          <button key={opt.label} onClick={() => choose(opt.value)}
            className="rounded-2xl border-2 border-mist-100 bg-white hover:border-mist-400 hover:bg-mist-50 hover:-translate-y-0.5 hover:shadow-md hover:shadow-mist-100 active:translate-y-0 active:scale-[.98] transition-all duration-200 px-5 py-4 text-sea-700 font-medium focus:outline-none focus-visible:ring-4 focus-visible:ring-mist-200">
            {opt.label}
          </button>
        ))}
      </div>
    </div>
  );
}

/* ===== estado-del-mar.05-meditation-player.js ===== */

function MeditationPlayer({ meditation }) {
  const [playing, setPlaying] = React.useState(false);
  const [progress, setProgress] = React.useState(0);
  const totalMinutes = parseInt(meditation.duration) || 6;

  React.useEffect(() => {
    if (!playing) return;
    const step = 100 / (totalMinutes * 10);
    const id = setInterval(() => {
      setProgress(p => {
        if (p + step >= 100) { setPlaying(false); return 100; }
        return p + step;
      });
    }, 300);
    return () => clearInterval(id);
  }, [playing, totalMinutes]);

  function toggle() {
    if (progress >= 100) setProgress(0);
    setPlaying(p => !p);
  }

  const elapsedMin = Math.floor((progress / 100) * totalMinutes);
  const elapsedSec = Math.floor((((progress / 100) * totalMinutes) % 1) * 60);

  return (
    <div className="max-w-xl mx-auto py-4">
      <div className="bg-gradient-to-br from-mist-400 to-sea-600 rounded-3xl shadow-lg shadow-mist-200/50 p-8 md:p-10 text-center text-white">
        <p className="text-xs uppercase tracking-widest text-white/80 mb-2">Meditación guiada</p>
        <h4 className="font-serif text-2xl md:text-3xl mb-2">{meditation.title}</h4>
        <p className="text-white/90 text-sm mb-8">{meditation.description}</p>
        <button onClick={toggle}
          className={"w-16 h-16 rounded-full bg-white text-mist-600 text-2xl flex items-center justify-center mx-auto mb-6 hover:scale-110 active:scale-95 transition-transform duration-300 shadow-xl " + (playing ? "animate-breathe" : "")}>
          {playing ? '❚❚' : '▶'}
        </button>
        <div className="w-full h-1.5 bg-white/25 rounded-full overflow-hidden mb-2">
          <div className="h-full bg-white transition-all" style={{ width: progress + '%' }}></div>
        </div>
        <p className="text-xs text-white/80">{elapsedMin}:{String(elapsedSec).padStart(2,'0')} / {meditation.duration}</p>
      </div>
      <p className="text-center text-xs text-sea-400 mt-4">Audio de ejemplo — acá se integraría el archivo de audio real.</p>
    </div>
  );
}

function AuthModal({ intent, initialMode, onClose, onAuthed }) {
  const [mode, setMode] = React.useState(initialMode || (intent === 'subscribe' ? 'signup' : 'login')); // signup | login
  const [name, setName] = React.useState('');
  const [email, setEmail] = React.useState('');
  const [password, setPassword] = React.useState('');
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState('');
  const [needsConfirm, setNeedsConfirm] = React.useState(false);

  async function handleSubmit() {
    setError('');
    if (!email || !password) { setError('Completá email y contraseña.'); return; }
    setLoading(true);
    if (mode === 'signup') {
      const { data, error: err } = await sb.auth.signUp({
        email, password, options: { data: { name } },
      });
      setLoading(false);
      if (err) { setError(err.message); return; }
      if (!data.session) { setNeedsConfirm(true); return; }
      onAuthed(intent === 'subscribe');
    } else {
      const { error: err } = await sb.auth.signInWithPassword({ email, password });
      setLoading(false);
      if (err) { setError(err.message); return; }
      onAuthed(false);
    }
  }

  if (needsConfirm) {
    return (
      <Modal onClose={onClose}>
        <div className="p-8 text-center">
          <p className="text-4xl mb-4">📬</p>
          <h3 className="font-serif text-2xl font-semibold text-sea-900 mb-3">Confirmá tu email</h3>
          <p className="text-sea-600 mb-6">Te mandamos un link de confirmación a {email}. Abrilo y después volvé acá para iniciar sesión.</p>
          <button onClick={onClose} className="btn btn-primary btn-block">Entendido</button>
        </div>
      </Modal>
    );
  }

  return (
    <Modal onClose={onClose}>
      <div className="p-8">
        <h3 className="font-serif text-2xl font-semibold text-sea-900 mb-1">
          {mode === 'signup' ? (intent === 'subscribe' ? 'Sumate a Estado del Mar' : 'Creá tu cuenta') : 'Iniciá sesión'}

        {mode === 'signup' && intent === 'subscribe' && (
          <p className="text-xs text-amber-600 bg-amber-50 border border-amber-200 rounded-xl px-3 py-2 mb-6">
            Modo demo: la suscripción se activa directamente, todavía sin pasarela de pago real.
          </p>
        )}
        {mode === 'signup' && intent !== 'subscribe' && (
          <p className="text-sea-500 text-sm mb-6">Creá tu cuenta gratis — suscribirte para desbloquear el contenido es un paso aparte, cuando quieras.</p>

function TopicEditForm({ topic, onSave, onCancel }) {
  const isNew = !topic;
  const [title, setTitle] = React.useState(topic ? topic.title : '');
  const [emoji, setEmoji] = React.useState(topic ? topic.emoji : EMOJI_PRESETS[0]);
  const [gradient, setGradient] = React.useState(topic ? topic.gradient : GRADIENT_PRESETS[0]);
  const [description, setDescription] = React.useState(topic ? topic.description : '');
  const [slidesText, setSlidesText] = React.useState(
    topic ? topic.slides.map(s => s.title + ' :: ' + s.text).join('\n') : ''
  );
  const [medTitle, setMedTitle] = React.useState(topic ? topic.meditation.title : '');
  const [medDuration, setMedDuration] = React.useState(topic ? topic.meditation.duration : '6 min');
  const [medDescription, setMedDescription] = React.useState(topic ? topic.meditation.description : '');
  const [exerciseTitle, setExerciseTitle] = React.useState(topic ? topic.exercise.title : '');
  const [stepsText, setStepsText] = React.useState(topic ? topic.exercise.steps.join('\n') : '');

  function handleSave() {
    const slides = slidesText.split('\n').map(l => l.trim()).filter(Boolean).map(line => {
      const [t, ...rest] = line.split('::');
      return { title: (t || '').trim(), text: rest.join('::').trim() || (t || '').trim() };
    });
    const steps = stepsText.split('\n').map(l => l.trim()).filter(Boolean);

    const base = topic || { id: slugify(title), questions: makeDefaultQuiz(title || 'este tema'), levels: makeDefaultLevels() };

    const updated = {
      ...base,
      title, emoji, gradient, description,
      slides: slides.length ? slides : (base.slides || []),
      meditation: { title: medTitle, duration: medDuration, description: medDescription },
      exercise: { title: exerciseTitle, steps: steps.length ? steps : (base.exercise ? base.exercise.steps : []) },
    };
    onSave(updated);
  }

  return (
    <div className="bg-white rounded-3xl border border-sea-100 p-6 md:p-8 space-y-5">
      <h3 className="font-serif text-2xl text-sea-900">{isNew ? 'Nueva ventana' : 'Editar ventana: ' + topic.title}</h3>
      {isNew && (
        <p className="text-xs text-amber-600 bg-amber-50 border border-amber-200 rounded-xl px-3 py-2">
          Las ventanas nuevas arrancan con un check-in genérico de 4 preguntas, que después se puede personalizar.
        </p>
      )}
      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label className="text-sm font-semibold text-sea-700 block mb-1">Título</label>
          <input value={title} onChange={e => setTitle(e.target.value)} className="w-full border border-mist-200 rounded-xl px-4 py-2.5 focus:outline-none focus:border-mist-400 focus:ring-4 focus:ring-mist-100 transition-all" placeholder="Ej: Autoestima" />
        </div>
        <div>
          <label className="text-sm font-semibold text-sea-700 block mb-1">Ícono (emoji)</label>
          <select value={emoji} onChange={e => setEmoji(e.target.value)} className="w-full border border-mist-200 rounded-xl px-4 py-2.5 focus:outline-none focus:border-mist-400 focus:ring-4 focus:ring-mist-100 transition-all">
            {EMOJI_PRESETS.map(em => <option key={em} value={em}>{em}</option>)}
          </select>
        </div>
      </div>
      <div>
        <label className="text-sm font-semibold text-sea-700 block mb-1">Color</label>
        <div className="flex flex-wrap gap-2">
          {GRADIENT_PRESETS.map(g => (
            <button key={g} onClick={() => setGradient(g)}
              className={"w-10 h-10 rounded-full bg-gradient-to-br " + g + " border-2 " + (gradient === g ? "border-sea-900" : "border-white")}>
            </button>
          ))}
        </div>
      </div>
      <div>
        <label className="text-sm font-semibold text-sea-700 block mb-1">Descripción corta</label>
        <textarea value={description} onChange={e => setDescription(e.target.value)} rows="2" className="w-full border border-mist-200 rounded-xl px-4 py-2.5 focus:outline-none focus:border-mist-400 focus:ring-4 focus:ring-mist-100 transition-all" />
      </div>
      <div>
        <label className="text-sm font-semibold text-sea-700 block mb-1">Diapositivas de contenido (una por línea, formato "Título :: Texto")</label>
        <textarea value={slidesText} onChange={e => setSlidesText(e.target.value)} rows="5" className="w-full border border-sea-200 rounded-xl px-4 py-2.5 font-mono text-xs" />
      </div>
      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div>
          <label className="text-sm font-semibold text-sea-700 block mb-1">Título meditación</label>
          <input value={medTitle} onChange={e => setMedTitle(e.target.value)} className="w-full border border-mist-200 rounded-xl px-4 py-2.5 focus:outline-none focus:border-mist-400 focus:ring-4 focus:ring-mist-100 transition-all" />
        </div>
        <div>
          <label className="text-sm font-semibold text-sea-700 block mb-1">Duración</label>
          <input value={medDuration} onChange={e => setMedDuration(e.target.value)} className="w-full border border-mist-200 rounded-xl px-4 py-2.5 focus:outline-none focus:border-mist-400 focus:ring-4 focus:ring-mist-100 transition-all" placeholder="6 min" />
        </div>
        <div>
          <label className="text-sm font-semibold text-sea-700 block mb-1">Descripción meditación</label>
          <input value={medDescription} onChange={e => setMedDescription(e.target.value)} className="w-full border border-mist-200 rounded-xl px-4 py-2.5 focus:outline-none focus:border-mist-400 focus:ring-4 focus:ring-mist-100 transition-all" />
        </div>
      </div>
      <div>
        <label className="text-sm font-semibold text-sea-700 block mb-1">Título del ejercicio</label>
        <input value={exerciseTitle} onChange={e => setExerciseTitle(e.target.value)} className="w-full border border-mist-200 rounded-xl px-4 py-2.5 focus:outline-none focus:border-mist-400 focus:ring-4 focus:ring-mist-100 transition-all" />
      </div>
      <div>
        <label className="text-sm font-semibold text-sea-700 block mb-1">Pasos del ejercicio (uno por línea)</label>
        <textarea value={stepsText} onChange={e => setStepsText(e.target.value)} rows="4" className="w-full border border-mist-200 rounded-xl px-4 py-2.5 focus:outline-none focus:border-mist-400 focus:ring-4 focus:ring-mist-100 transition-all" />
      </div>
      <div className="flex gap-3 pt-2">
        <button onClick={handleSave} className="btn btn-primary">Guardar</button>
        <button onClick={onCancel} className="btn btn-ghost">Cancelar</button>
      </div>
    </div>
  );
}

function AdminPanel({ topics, price, setPrice, onExit, onSaveTopic, onDeleteTopic, onSeedInitial }) {
  const [editingId, setEditingId] = React.useState(null);
  const [creating, setCreating] = React.useState(false);
  const [saving, setSaving] = React.useState(false);
  const [seeding, setSeeding] = React.useState(false);

  async function saveTopic(updated) {
    setSaving(true);
    await onSaveTopic(updated);
    setSaving(false);
    setEditingId(null);
    setCreating(false);
  }

  async function deleteTopic(id) {
    if (confirm('¿Eliminar esta ventana? Esta acción no se puede deshacer.')) {
      await onDeleteTopic(id);
    }
  }

  async function seedInitial() {
    setSeeding(true);
    await onSeedInitial();
    setSeeding(false);
  }

  const editingTopic = topics.find(t => t.id === editingId);

  return (
    <div className="min-h-screen bg-sand-50">
      <div className="bg-gradient-to-r from-mist-500 to-sea-600 text-white">
        <div className="max-w-5xl mx-auto px-6 py-8 flex items-center justify-between">
          <div>
            <h1 className="font-serif text-3xl font-semibold">Panel de administración</h1>
            <p className="text-white/80 text-sm mt-1">Modo demo — los cambios se guardan solo en esta sesión del navegador.</p>
          </div>
          <button onClick={onExit} className="btn-link text-white/90 hover:text-white text-sm font-semibold">Salir →</button>
        </div>
      </div>

      <div className="max-w-5xl mx-auto px-6 py-10 space-y-10">
        <div className="bg-white rounded-3xl border border-sea-100 p-6 md:p-8">
          <h3 className="font-serif text-xl text-sea-900 mb-4">Configuración general</h3>
          <label className="text-sm font-semibold text-sea-700 block mb-1">Precio de la suscripción mensual</label>
          <div className="flex items-center gap-2 max-w-xs">
            <span className="text-sea-500">$</span>
            <input value={price} onChange={e => setPrice(e.target.value)} className="w-full border border-mist-200 rounded-xl px-4 py-2.5 focus:outline-none focus:border-mist-400 focus:ring-4 focus:ring-mist-100 transition-all" />
            <span className="text-sea-500">/mes</span>
          </div>
          <div className="mt-6 pt-6 border-t border-mist-100">
            <button onClick={seedInitial} disabled={seeding} className="btn-link text-sm text-sea-600 hover:text-sea-800 disabled:opacity-50 inline-block">
              {seeding ? 'Cargando…' : 'Cargar las 10 ventanas iniciales en la base (una sola vez)'}
            </button>
          </div>
        </div>

        {(creating || editingTopic) ? (
          <TopicEditForm
            topic={editingTopic || null}
            onSave={saveTopic}
            onCancel={() => { setEditingId(null); setCreating(false); }}
          />
        ) : (
          <div>
            <div className="flex items-center justify-between mb-5">
              <h3 className="font-serif text-xl text-sea-900">Ventanas ({topics.length})</h3>
              <button onClick={() => setCreating(true)} className="btn btn-primary btn-sm">
                + Agregar ventana
              </button>
            </div>
            <div className="space-y-3">
              {topics.map(t => (
                <div key={t.id} className="bg-white rounded-2xl border border-mist-100 p-4 flex items-center gap-4 hover:shadow-md hover:shadow-mist-100 transition-shadow">
                  <div className={"w-12 h-12 rounded-full bg-gradient-to-br " + t.gradient + " flex items-center justify-center text-xl flex-shrink-0"}>{t.emoji}</div>
                  <div className="flex-1 min-w-0">
                    <p className="font-semibold text-sea-900">{t.title}</p>
                    <p className="text-sea-500 text-sm truncate">{t.description}</p>
                  </div>
                  <button onClick={() => setEditingId(t.id)} className="btn-link text-sea-600 hover:text-sea-900 text-sm font-semibold px-3 py-1.5">Editar</button>
                  <button onClick={() => deleteTopic(t.id)} className="btn-link text-red-500 hover:text-red-700 text-sm font-semibold px-3 py-1.5">Eliminar</button>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

                <p className="text-3xl mb-3 group-hover:scale-110 group-hover:animate-drift transition-transform duration-300">{v.emoji}</p>
                <h3 className="font-serif text-xl font-semibold text-sea-900 mb-2">{v.title}</h3>

          ))}
        </div>
        <Reveal>
          <div className="relative overflow-hidden bg-gradient-to-br from-mist-400 to-sea-600 text-white rounded-3xl p-8 md:p-10 text-center shadow-xl shadow-mist-200/50">
            <div className="absolute -top-10 -right-10 w-48 h-48 rounded-full bg-white/10 blur-2xl animate-aurora"></div>
            <div className="relative z-10">
              <h3 className="font-serif text-2xl md:text-3xl mb-3">¿Te resuena?</h3>
              <p className="text-white/90 mb-6 max-w-md mx-auto">Una sola suscripción abre todas las ventanas, a tu propio ritmo.</p>
              <div className="flex flex-col sm:flex-row gap-3 justify-center items-center">
                <button onClick={onOpenSubscribe} className="btn btn-coral">Suscribirme</button>
                <button onClick={() => onOpenPage('contacto')} className="btn btn-ondark">Hacer una consulta</button>
              </div>
            </div>
          </div>
        </Reveal>
      </div>
    </div>
  );
}

function FaqItem({ q, a, open, onToggle }) {

      <button onClick={onToggle} className="w-full flex items-center justify-between gap-4 px-6 py-5 text-left">
        <span className="font-semibold text-sea-900">{q}</span>
        <span className={"text-coral-500 text-2xl leading-none transition-transform duration-300 " + (open ? "rotate-45" : "")}>+</span>
      </button>
      {open && <p className="px-6 pb-5 text-sea-600 leading-relaxed animate-fadein">{a}</p>}

  );
}

/* ===== estado-del-mar.12-app-root.js ===== */

function App() {
  const [topics, setTopics] = React.useState(INITIAL_TOPICS);
  const [view, setView] = React.useState('home'); // home | detail | admin | profile
  const [activeTopicId, setActiveTopicId] = React.useState(null);
  const [session, setSession] = React.useState(null);
  const [authChecked, setAuthChecked] = React.useState(false);
  const [profile, setProfile] = React.useState(null);
  const [price, setPrice] = React.useState('9.990');
  const [showAuthModal, setShowAuthModal] = React.useState(false);
  const [authIntent, setAuthIntent] = React.useState('account'); // 'account' | 'subscribe'
  const [authInitialMode, setAuthInitialMode] = React.useState(null); // null | 'login' | 'signup'
  const [pendingScroll, setPendingScroll] = React.useState(null);

  React.useEffect(() => {
    sb.auth.getSession().then(({ data }) => {
      setSession(data.session);
      setAuthChecked(true);
    });
    const { data: listener } = sb.auth.onAuthStateChange((_event, newSession) => {
      setSession(newSession);
    });
    return () => listener.subscription.unsubscribe();
  }, []);

  React.useEffect(() => {
    const userId = session && session.user ? session.user.id : null;
    if (!userId) { setProfile(null); return; }
    sb.from('profiles').select('*').eq('id', userId).single().then(({ data, error }) => {
      if (!error) setProfile(data);
    });
  }, [session]);

  React.useEffect(() => {
    sb.from('topics').select('*').order('created_at', { ascending: true }).then(({ data, error }) => {
      if (!error && data && data.length > 0) setTopics(data);
    });
  }, []);

  React.useEffect(() => {
    if (view === 'home' && pendingScroll) {
      const el = document.getElementById(pendingScroll);
      if (el) el.scrollIntoView({ behavior: 'smooth' });
      setPendingScroll(null);
    }
  }, [view, pendingScroll]);

  function goHome() { setView('home'); setActiveTopicId(null); window.scrollTo(0,0); }
  function selectTopic(id) { setActiveTopicId(id); setView('detail'); }
  function goToSection(sectionId) {
    if (view === 'home') {
      const el = document.getElementById(sectionId);
      if (el) el.scrollIntoView({ behavior: 'smooth' });
    } else {
      setActiveTopicId(null);
      setPendingScroll(sectionId);
      setView('home');
    }
  }
  function openPage(pageId) {
    setActiveTopicId(null);
    setView(pageId);
    window.scrollTo(0, 0);
  }

  async function markSubscribedForUser(userId) {
    const { error } = await sb.from('profiles').update({ subscribed: true, subscribed_at: new Date().toISOString() }).eq('id', userId);
    if (!error) setProfile(p => ({ ...(p || { id: userId }), subscribed: true, subscribed_at: new Date().toISOString() }));
  }

  async function markSubscribed() {
    if (session && session.user) await markSubscribedForUser(session.user.id);
  }

  async function cancelSubscription() {
    if (!session || !session.user) return;
    const { error } = await sb.from('profiles').update({ subscribed: false }).eq('id', session.user.id);
    if (!error) setProfile(p => ({ ...(p || {}), subscribed: false }));
  }

  async function signOutUser() {
    await sb.auth.signOut();
    goHome();
  }

  async function saveProfileFields(fields) {
    if (!session || !session.user) return { error: 'No hay sesión activa.' };
    const { error } = await sb.from('profiles').update(fields).eq('id', session.user.id);
    if (!error) setProfile(p => ({ ...(p || {}), ...fields }));
    return { error: error ? error.message : null };
  }

  function openSubscribeFlow() {
    if (session && session.user) {
      markSubscribed();
    } else {
      setAuthIntent('subscribe');
      setAuthInitialMode('signup');
      setShowAuthModal(true);
    }
  }

  function openAuthFlow() {
    setAuthIntent('account');
    setAuthInitialMode('login');
    setShowAuthModal(true);
  }

  function openRegisterFlow() {
    setAuthIntent('account');
    setAuthInitialMode('signup');
    setShowAuthModal(true);
  }

  async function handleAuthed(shouldSubscribe) {
    setShowAuthModal(false);
    if (!shouldSubscribe) return;
    const { data } = await sb.auth.getSession();
    if (data.session) await markSubscribedForUser(data.session.user.id);
  }

  async function saveTopicToDb(updated) {
    const { error } = await sb.from('topics').upsert(updated);
    if (error) { alert('No se pudo guardar: ' + error.message); return; }
    setTopics(prev => {
      const exists = prev.some(t => t.id === updated.id);
      return exists ? prev.map(t => t.id === updated.id ? updated : t) : [...prev, updated];
    });
  }

  async function deleteTopicFromDb(id) {
    const { error } = await sb.from('topics').delete().eq('id', id);
    if (error) { alert('No se pudo eliminar: ' + error.message); return; }
    setTopics(prev => prev.filter(t => t.id !== id));
  }

  async function seedInitialTopics() {
    const { error } = await sb.from('topics').upsert(INITIAL_TOPICS);
    if (error) { alert('No se pudo cargar el contenido inicial: ' + error.message); return; }
    const { data } = await sb.from('topics').select('*').order('created_at', { ascending: true });
    if (data) setTopics(data);
  }

  if (!authChecked) {
    return (
      <div className="min-h-screen flex items-center justify-center bg-sand-50">
        <p className="text-sea-400 text-sm">Cargando…</p>
      </div>
    );
  }

  const loggedIn = !!(session && session.user);
  const subscribed = !!(profile && profile.subscribed);
  const isAdmin = !!(profile && profile.is_admin);

  if (view === 'admin') {
    if (!isAdmin) {
      return (
        <div className="min-h-screen flex items-center justify-center bg-sand-50 px-6 text-center">
          <div>
            <p className="text-4xl mb-4">🔒</p>
            <p className="text-sea-700 mb-4">No tenés acceso al panel de administración.</p>
            <button onClick={goHome} className="text-sea-600 underline">Volver</button>
          </div>
        </div>
      );
    }
    return <AdminPanel topics={topics} price={price} setPrice={setPrice} onExit={goHome} onSaveTopic={saveTopicToDb} onDeleteTopic={deleteTopicFromDb} onSeedInitial={seedInitialTopics} />;
  }

  if (view === 'profile') {
    if (!loggedIn) { goHome(); return null; }
    return (
      <ProfilePanel
        email={session.user.email}
        profile={profile}
        subscribed={subscribed}
        subscribeDate={profile ? profile.subscribed_at : null}
        onSave={saveProfileFields}
        onSubscribe={markSubscribed}
        onCancelSubscription={cancelSubscription}
        onSignOut={signOutUser}
        onExit={goHome}
      />
    );
  }

  if (view === 'sobre' || view === 'faq' || view === 'contacto') {
    return (
      <div>
        <Header loggedIn={loggedIn} onNav={goHome} onNavigateSection={goToSection} onOpenPage={openPage} onOpenAuth={openAuthFlow} onOpenRegister={openRegisterFlow} onOpenAccount={() => setView('profile')} onOpenSubscribe={openSubscribeFlow} />
        {view === 'sobre' && <SobrePage onOpenSubscribe={openSubscribeFlow} onOpenPage={openPage} />}
        {view === 'faq' && <FaqPage onOpenPage={openPage} />}
        {view === 'contacto' && <ContactoPage onOpenPage={openPage} />}
        <Footer onOpenAdmin={() => setView('admin')} showAdminLink={isAdmin} onOpenPage={openPage} />
        {showAuthModal && <AuthModal intent={authIntent} initialMode={authInitialMode} onClose={() => setShowAuthModal(false)} onAuthed={handleAuthed} />}
      </div>
    );
  }

  if (view === 'detail') {
    const topic = topics.find(t => t.id === activeTopicId);
    if (!topic) { goHome(); return null; }
    return (
      <div>
        <Header loggedIn={loggedIn} onNav={goHome} onNavigateSection={goToSection} onOpenPage={openPage} onOpenAuth={openAuthFlow} onOpenRegister={openRegisterFlow} onOpenAccount={() => setView('profile')} onOpenSubscribe={openSubscribeFlow} />
        <TopicDetail topic={topic} subscribed={subscribed} onBack={goHome} onOpenSubscribe={openSubscribeFlow} />
        <Footer onOpenAdmin={() => setView('admin')} showAdminLink={isAdmin} onOpenPage={openPage} />
        {showAuthModal && <AuthModal intent={authIntent} initialMode={authInitialMode} onClose={() => setShowAuthModal(false)} onAuthed={handleAuthed} />}
      </div>
    );
  }

  return (
    <div>
      <Header loggedIn={loggedIn} onNav={goHome} onNavigateSection={goToSection} onOpenPage={openPage} onOpenAuth={openAuthFlow} onOpenRegister={openRegisterFlow} onOpenAccount={() => setView('profile')} onOpenSubscribe={openSubscribeFlow} />
      <Hero onOpenSubscribe={openSubscribeFlow} />
      <TopicsGrid topics={topics} subscribed={subscribed} onSelect={selectTopic} />
      <HowItWorks />
      <PricingSection price={price} onOpenSubscribe={openSubscribeFlow} onOpenPage={openPage} />
      <Footer onOpenAdmin={() => setView('admin')} showAdminLink={isAdmin} onOpenPage={openPage} />
      {showAuthModal && <AuthModal intent={authIntent} initialMode={authInitialMode} onClose={() => setShowAuthModal(false)} onAuthed={handleAuthed} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
