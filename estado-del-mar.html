// F1: Recalcula los rangos min/max de cada nivel según el puntaje máximo posible (preguntas × 3).
// Garantiza: rangos contiguos, min<=max siempre, sin solapamientos, último nivel llega a maxScore.
// Si hay más niveles que puntajes posibles, los sobrantes quedan como rangos de un punto
// fuera del rango alcanzable pero NUNCA con min>max.
function computeDynamicLevels(levels, questionCount) {
  if (!levels || levels.length === 0 || !questionCount || questionCount <= 0) return levels || [];
  const maxScore = questionCount * 3;
  const count = levels.length;
  const result = [];
  let cursor = 0; // próximo min disponible
  for (let i = 0; i < count; i++) {
    const isLast = i === count - 1;
    let min = cursor;
    let max;
    if (isLast) {
      // El último nivel absorbe hasta maxScore (o queda en min si ya se agotaron los puntajes)
      max = Math.max(min, maxScore);
    } else {
      // Repartimos el rango restante entre los niveles que quedan
      const remaining = count - i;
      const rangeLeft = maxScore - cursor;
      // Tamaño del tramo (al menos 0 para no hacer min>max)
      const step = Math.max(0, Math.round(rangeLeft / remaining));
      max = min + step - 1;
      // Asegurar min <= max (puede pasar si hay más niveles que puntajes)
      if (max < min) max = min;
    }
    result.push({ ...levels[i], min, max });
    cursor = max + 1;
  }
  return result;
}

function computeLevel(total, levels, questionCount) {
  if (!levels || levels.length === 0) return null;
  const dynLevels = (questionCount != null) ? computeDynamicLevels(levels, questionCount) : levels;
  return dynLevels.find(l => total >= l.min && total <= l.max) || dynLevels[dynLevels.length - 1];
}

// F6: guard para evitar "Invalid Date" si d es nulo, vacío o un string malformado
function formatDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  if (isNaN(dt.getTime())) return '';
  return dt.toLocaleDateString('es-AR', { day: 'numeric', month: 'long', year: 'numeric' });
}

function slugify(str) {
  return str.toLowerCase().normalize('NFD').replace(new RegExp('[' + String.fromCharCode(768) + '-' + String.fromCharCode(879) + ']', 'g'), '')
    .replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '') || ('ventana-' + Date.now());
}

// M8: mapea mensajes de error de Supabase (en inglés) a español legible
function traducirError(msg) {
  if (!msg) return 'Ocurrió un error, probá de nuevo.';
  const m = msg.toLowerCase();
  if (m.includes('invalid login credentials')) return 'Email o contraseña incorrectos.';
  if (m.includes('user already registered') || m.includes('already registered')) return 'Ese email ya está registrado.';
  if (m.includes('password should be at least')) return 'La contraseña debe tener al menos 6 caracteres.';
  if (m.includes('email not confirmed')) return 'Tenés que confirmar tu email antes de entrar.';
  if (m.includes('rate limit')) return 'Demasiados intentos. Esperá unos minutos y probá de nuevo.';
  if (m.includes('network') || m.includes('fetch')) return 'Error de conexión. Verificá tu internet y probá de nuevo.';
  return 'Ocurrió un error, probá de nuevo. (' + msg + ')';
}

// M7: hook de focus trap — atrapa Tab/Shift+Tab dentro del contenedor y devuelve foco al elemento previo al desmontar
function useFocusTrap(ref) {
  React.useEffect(() => {
    const previousFocus = document.activeElement;
    // Mover foco al contenedor o primer elemento enfocable
    if (ref.current) {
      const focusable = ref.current.querySelectorAll(
        'a[href],button:not([disabled]),input:not([disabled]),select:not([disabled]),textarea:not([disabled]),[tabindex]:not([tabindex="-1"])'
      );
      if (focusable.length > 0) {
        focusable[0].focus();
      } else {
        ref.current.focus();
      }
    }
    function handleTab(e) {
      if (e.key !== 'Tab' || !ref.current) return;
      const focusable = Array.from(ref.current.querySelectorAll(
        'a[href],button:not([disabled]),input:not([disabled]),select:not([disabled]),textarea:not([disabled]),[tabindex]:not([tabindex="-1"])'
      )).filter(el => !el.closest('[hidden]'));
      if (focusable.length === 0) { e.preventDefault(); return; }
      const first = focusable[0];
      const last = focusable[focusable.length - 1];
      if (e.shiftKey) {
        if (document.activeElement === first) { e.preventDefault(); last.focus(); }
      } else {
        if (document.activeElement === last) { e.preventDefault(); first.focus(); }
      }
    }
    window.addEventListener('keydown', handleTab);
    return () => {
      window.removeEventListener('keydown', handleTab);
      // Devolver foco al elemento que lo tenía antes de abrir
      if (previousFocus && typeof previousFocus.focus === 'function') {
        try { previousFocus.focus(); } catch(e) {}
      }
    };
  }, []);
}

function Modal({ onClose, children, maxW }) {
  // M7: ref al onClose para no re-suscribir el listener en cada render
  const onCloseRef = React.useRef(onClose);
  React.useEffect(() => { onCloseRef.current = onClose; }, [onClose]);

  const containerRef = React.useRef(null);
  useFocusTrap(containerRef); // M7: focus trap

  // M6: captura el overflow original UNA sola vez al montar; lo restaura al desmontar
  React.useEffect(() => {
    const prev = document.body.style.overflow;
    document.body.style.overflow = 'hidden';
    return () => { document.body.style.overflow = prev; };
  }, []);

  // M6/M7: listener de Escape separado, usa ref para no re-suscribir
  React.useEffect(() => {
    const onKey = e => { if (e.key === 'Escape') onCloseRef.current(); };
    window.addEventListener('keydown', onKey);
    return () => { window.removeEventListener('keydown', onKey); };
  }, []);
  return (
    <div className="fixed inset-0 z-50 bg-sea-900/40 backdrop-blur-sm flex items-center justify-center p-4 animate-fadein" onClick={onClose}>
      <div ref={containerRef} onClick={e => e.stopPropagation()} className={"bg-white rounded-3xl shadow-2xl w-full max-h-[90vh] overflow-y-auto animate-fadein " + (maxW || "max-w-md")}>
        {children}
      </div>
    </div>
  );
}

function Reveal({ children, className }) {
  const ref = React.useRef(null);
  const [visible, setVisible] = React.useState(false);
  React.useEffect(() => {
    const obs = new IntersectionObserver(entries => {
      if (entries[0].isIntersecting) { setVisible(true); obs.disconnect(); }
    }, { threshold: 0.15 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return (
    <div ref={ref} className={(className || '') + ' reveal' + (visible ? ' visible' : '')}>
      {children}
    </div>
  );
}

function DiagnosticQuiz({ topic, onComplete }) {
  const [answers, setAnswers] = React.useState([]);
  const [current, setCurrent] = React.useState(0);
  const [result, setResult] = React.useState(null);

  // Guard: si no hay preguntas o niveles, mostrá estado vacío
  const questions = (topic && topic.questions) || [];
  const levels = (topic && topic.levels) || [];

  if (!questions.length) {
    return (
      <div className="max-w-xl mx-auto py-10 text-center text-sea-500">
        <p className="text-3xl mb-3">📋</p>
        <p className="font-semibold">Esta ventana todavía no tiene preguntas de check-in.</p>
        <p className="text-sm mt-1">El administrador puede agregarlas desde el panel.</p>
      </div>
    );
  }

  function choose(value) {
    // Reemplazá la respuesta actual si ya existía (al volver y re-responder)
    const next = [...answers.slice(0, current), value];
    setAnswers(next);
    if (current + 1 < questions.length) {
      setCurrent(current + 1);
    } else {
      const total = next.reduce((a, b) => a + b, 0);
      const level = computeLevel(total, levels, questions.length);
      setResult({ total, level });
      if (onComplete) onComplete(level);
    }
  }

  // M3 / F2: volver a la pregunta anterior — usa current como índice de verdad
  // para no depender de que answers.length coincida con current (invariante frágil).
  function goBack() {
    if (current > 0) {
      setAnswers(a => a.slice(0, current - 1));
      setCurrent(current - 1);
    }
  }

  function restart() {
    setAnswers([]);
    setCurrent(0);
    setResult(null);
  }

  if (result) {
    return (
      <div className="animate-fadein max-w-xl mx-auto text-center py-6">
        <p className="uppercase tracking-widest text-xs text-sea-500 font-semibold mb-2">Tu check-in de hoy</p>
        {/* N4: si no hay nivel configurado, mostrar mensaje claro en lugar de texto vacío */}
        <h3 className="font-serif text-3xl md:text-4xl font-semibold text-sea-900 mb-4">
          {result.level ? result.level.label : 'Gracias por tu check-in'}
        </h3>
        <p className="text-sea-700 leading-relaxed mb-6">
          {result.level ? result.level.message : 'Todavía no hay resultados configurados para esta ventana.'}
        </p>
        <p className="text-xs text-sea-400 mb-6 italic">Esto es una orientación para elegir contenido, no un diagnóstico clínico. Si algo de esto te desborda, una consulta con un profesional siempre suma.</p>
        <button onClick={restart} className="btn btn-soft btn-sm">Volver a hacer el check-in</button>
      </div>
    );
  }

  const q = questions[current];

  return (
    <div className="max-w-xl mx-auto py-4">
      <div className="mb-6"><ProgressDots count={questions.length} current={current} /></div>
      <p className="text-center text-xs text-sea-400 mb-2">Pregunta {current + 1} de {questions.length}</p>
      <h3 className="text-center font-serif text-2xl md:text-3xl text-sea-900 mb-8 px-2 break-words">{q.text}</h3>
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
        {LIKERT.map(opt => (
          <button key={opt.label} onClick={() => choose(opt.value)}
            className="rounded-2xl border-2 border-mist-100 bg-white hover:border-mist-400 hover:bg-mist-50 hover:-translate-y-0.5 hover:shadow-md hover:shadow-mist-100 active:translate-y-0 active:scale-[.98] transition-all duration-200 px-5 py-4 text-sea-700 font-medium focus:outline-none focus-visible:ring-4 focus-visible:ring-mist-200">
            {opt.label}
          </button>
        ))}
      </div>
      {/* M3: botón para volver a la pregunta anterior */}
      {current > 0 && (
        <div className="mt-5 text-center">
          <button onClick={goBack} className="btn btn-ghost btn-sm">← Anterior</button>
        </div>
      )}
    </div>
  );
}

function SlideViewer({ slides }) {
  const [i, setI] = React.useState(0);
  // Guard: si no hay diapositivas, mostrá estado vacío
  const safeSlides = Array.isArray(slides) && slides.length > 0 ? slides : null;

  // B4: navegación con teclado (← →) y swipe táctil
  const touchStartX = React.useRef(null);
  React.useEffect(() => {
    if (!safeSlides) return;
    function onKey(e) {
      if (e.key === 'ArrowLeft') setI(prev => Math.max(0, prev - 1));
      if (e.key === 'ArrowRight') setI(prev => Math.min(safeSlides.length - 1, prev + 1));
    }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [safeSlides]);

  function onTouchStart(e) { touchStartX.current = e.touches[0].clientX; }
  function onTouchEnd(e) {
    if (touchStartX.current === null || !safeSlides) return;
    const delta = touchStartX.current - e.changedTouches[0].clientX;
    if (Math.abs(delta) > 50) {
      if (delta > 0) setI(prev => Math.min(safeSlides.length - 1, prev + 1));
      else setI(prev => Math.max(0, prev - 1));
    }
    touchStartX.current = null;
  }

  if (!safeSlides) {
    return (
      <div className="max-w-xl mx-auto py-10 text-center text-sea-500">
        <p className="text-3xl mb-3">📄</p>
        <p className="font-semibold">Sin diapositivas aún.</p>
        <p className="text-sm mt-1">El administrador puede agregar el contenido desde el panel.</p>
      </div>
    );
  }
  const slide = safeSlides[i];
  return (
    <div className="max-w-xl mx-auto py-4" onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
      <div className="bg-white rounded-3xl shadow-sm border border-mist-100 p-8 md:p-10 min-h-[220px] flex flex-col justify-center animate-fadein" key={i}>
        <p className="text-xs uppercase tracking-widest text-mist-500 mb-3">Diapositiva {i + 1} de {safeSlides.length}</p>
        <h4 className="font-serif text-2xl md:text-3xl text-sea-900 mb-3 break-words">{slide.title}</h4>
        <p className="text-sea-700 leading-relaxed break-words">{slide.text}</p>
      </div>
      <div className="flex items-center justify-between mt-6">
        <button disabled={i === 0} onClick={() => setI(i - 1)}
          className="px-4 py-2 rounded-full text-sm font-semibold disabled:opacity-30 disabled:cursor-not-allowed text-sea-600 hover:bg-mist-100 hover:-translate-x-0.5 transition-all duration-200">
          ← Anterior
        </button>
        <ProgressDots count={safeSlides.length} current={i} />
        <button disabled={i === safeSlides.length - 1} onClick={() => setI(i + 1)}
          className="px-4 py-2 rounded-full text-sm font-semibold disabled:opacity-30 disabled:cursor-not-allowed text-sea-600 hover:bg-mist-100 hover:translate-x-0.5 transition-all duration-200">
          Siguiente →
        </button>
      </div>
      <p className="text-center text-xs text-sea-400 mt-4">Avanzá a tu propio ritmo — cada diapositiva es un disparador para tu propio insight.</p>
    </div>
  );
}

function MeditationPlayer({ meditation, audioUrl }) {
  // Todos los hooks al nivel superior (regla de hooks de React)
  const audioRealRef = React.useRef(null);
  const [audioError, setAudioError] = React.useState(false);
  const [playing, setPlaying] = React.useState(false);
  const [progress, setProgress] = React.useState(0);

  // A7: usar Math.max(1, ...) para evitar división por cero con duración 0 o inválida
  const totalMinutes = React.useMemo(
    () => Math.max(1, parseInt((meditation && meditation.duration) || '6') || 6),
    [meditation]
  );

  // A9: pausar audio al desmontar o al cambiar de URL
  React.useEffect(() => {
    return () => {
      if (audioRealRef.current) audioRealRef.current.pause();
    };
  }, [audioUrl]);

  // Reproductor de ejemplo: progreso simulado
  React.useEffect(() => {
    if (!playing || audioUrl) return;
    const step = 100 / (totalMinutes * 10);
    const id = setInterval(() => {
      setProgress(p => {
        if (p + step >= 100) { setPlaying(false); return 100; }
        return p + step;
      });
    }, 300);
    return () => clearInterval(id);
  }, [playing, totalMinutes, audioUrl]);

  // Guard: si no hay datos de meditación, mostrá estado vacío
  if (!meditation) {
    return (
      <div className="max-w-xl mx-auto py-10 text-center text-sea-500">
        <p className="text-3xl mb-3">🎧</p>
        <p className="font-semibold">Esta ventana todavía no tiene meditación configurada.</p>
        <p className="text-sm mt-1">El administrador puede agregarla desde el panel.</p>
      </div>
    );
  }

  // Si hay un audio real cargado desde el panel, usamos un reproductor real.
  if (audioUrl) {
    return (
      <div className="max-w-xl mx-auto py-4">
        <div className="bg-gradient-to-br from-mist-400 to-sea-600 rounded-3xl shadow-lg shadow-mist-200/50 p-8 md:p-10 text-center text-white">
          <p className="text-xs uppercase tracking-widest text-white/80 mb-2">Meditación guiada</p>
          <h4 className="font-serif text-2xl md:text-3xl mb-2 break-words">{meditation.title}</h4>
          <p className="text-white/90 text-sm mb-6 break-words">{meditation.description}</p>
          {audioError ? (
            <p className="bg-white/20 rounded-xl px-4 py-3 text-sm text-white font-semibold">
              No se pudo cargar el archivo. Verificá que se haya subido bien.
            </p>
          ) : (
            <audio
              ref={audioRealRef}
              src={audioUrl}
              controls
              className="w-full rounded-full"
              onError={() => setAudioError(true)}
            ></audio>
          )}
        </div>
      </div>
    );
  }

  // Reproductor de ejemplo (cuando todavía no se cargó un audio real).
  function toggle() {
    if (progress >= 100) setProgress(0);
    setPlaying(p => !p);
  }

  const elapsedMin = Math.floor((progress / 100) * totalMinutes);
  const elapsedSec = Math.floor((((progress / 100) * totalMinutes) % 1) * 60);

  return (
    <div className="max-w-xl mx-auto py-4">
      <div className="bg-gradient-to-br from-mist-400 to-sea-600 rounded-3xl shadow-lg shadow-mist-200/50 p-8 md:p-10 text-center text-white">
        <p className="text-xs uppercase tracking-widest text-white/80 mb-2">Meditación guiada</p>
        <h4 className="font-serif text-2xl md:text-3xl mb-2 break-words">{meditation.title}</h4>
        <p className="text-white/90 text-sm mb-8 break-words">{meditation.description}</p>
        <button onClick={toggle}
          className={"w-16 h-16 rounded-full bg-white text-mist-600 text-2xl flex items-center justify-center mx-auto mb-6 hover:scale-110 active:scale-95 transition-transform duration-300 shadow-xl " + (playing ? "animate-breathe" : "")}>
          {playing ? '❚❚' : '▶'}
        </button>
        <div className="w-full h-1.5 bg-white/25 rounded-full overflow-hidden mb-2">
          <div className="h-full bg-white transition-all" style={{ width: progress + '%' }}></div>
        </div>
        <p className="text-xs text-white/80">{elapsedMin}:{String(elapsedSec).padStart(2,'0')} / {totalMinutes}:00</p>
      </div>
      <p className="text-center text-xs text-sea-400 mt-4">Audio de ejemplo — cargá el audio real desde el panel de administración.</p>
    </div>
  );
}

function VideoPlayer({ src }) {

/* ===== estado-del-mar.06-exercise-checklist.js ===== */

function ExerciseChecklist({ exercise, storageKey }) {
  // F5: firma de los pasos actuales para detectar si cambiaron desde la última vez que se guardó
  const stepsSig = exercise && Array.isArray(exercise.steps) ? JSON.stringify(exercise.steps) : '';

  // M4 / F5: cargá el estado desde localStorage al montar (si hay storageKey).
  // Si la firma guardada no coincide con los pasos actuales, comenzá con done vacío
  // para no marcar pasos equivocados cuando el admin reordena o cambia los pasos.
  const [done, setDone] = React.useState(() => {
    if (!storageKey) return {};
    try {
      const raw = localStorage.getItem('edm_checklist_' + storageKey);
      if (!raw) return {};
      const parsed = JSON.parse(raw);
      // parsed puede ser { done: {}, sig: '' } (formato nuevo) o un objeto plano (formato viejo)
      if (parsed && typeof parsed === 'object' && 'sig' in parsed) {
        return parsed.sig === stepsSig ? (parsed.done || {}) : {};
      }
      // Formato viejo sin firma: descartamos para no marcar pasos equivocados
      return {};
    } catch(e) { return {}; }
  });

  // M4 / F5: guardá en localStorage cada vez que cambia `done`, junto con la firma de los pasos
  React.useEffect(() => {
    if (!storageKey) return;
    try {
      localStorage.setItem('edm_checklist_' + storageKey, JSON.stringify({ done, sig: stepsSig }));
    } catch(e) {}
  }, [done, storageKey, stepsSig]);

  function toggle(i) { setDone(d => ({ ...d, [i]: !d[i] })); }

  // Guard: si no hay ejercicio o steps, mostrá estado vacío
  if (!exercise || !Array.isArray(exercise.steps) || exercise.steps.length === 0) {
    return (
      <div className="max-w-xl mx-auto py-10 text-center text-sea-500">
        <p className="text-3xl mb-3">✍️</p>
        <p className="font-semibold">Esta ventana todavía no tiene ejercicio configurado.</p>
        <p className="text-sm mt-1">El administrador puede agregarlo desde el panel.</p>
      </div>
    );
  }

  const total = exercise.steps.length;
  const doneCount = Object.values(done).filter(Boolean).length;

  return (
    <div className="max-w-xl mx-auto py-4">
      <div className="bg-white rounded-3xl shadow-sm border border-mist-100 p-8 md:p-10">
        <p className="text-xs uppercase tracking-widest text-mist-500 mb-2">Ejercicio para poner en práctica</p>
        <h4 className="font-serif text-2xl md:text-3xl text-sea-900 mb-6">{exercise.title}</h4>
        <div className="space-y-3">
          {exercise.steps.map((step, i) => (
            <label key={i} className={"flex items-start gap-3 p-4 rounded-2xl border cursor-pointer transition-all duration-200 hover:-translate-y-0.5 " + (done[i] ? "bg-mist-50 border-mist-300" : "border-mist-100 hover:bg-sand-50 hover:border-mist-200")}>
              <input type="checkbox" checked={!!done[i]} onChange={() => toggle(i)} className="mt-1 w-4 h-4 accent-mist-500" />
              <span className={"text-sea-700 " + (done[i] ? "line-through text-sea-400" : "")}>{step}</span>
            </label>
          ))}
        </div>
        <div className="mt-6">
          <div className="w-full h-2 bg-mist-100 rounded-full overflow-hidden mb-2">
            <div className="h-full bg-gradient-to-r from-mist-400 to-mist-600 transition-all duration-500" style={{ width: (total ? (doneCount / total * 100) : 0) + '%' }}></div>
          </div>
          <p className="text-sm text-sea-500 text-center">{doneCount} de {total} pasos completados</p>
        </div>
      </div>
    </div>
  );
}

function AuthModal({ intent, initialMode, onClose, onAuthed }) {
  const [mode, setMode] = React.useState(initialMode || (intent === 'subscribe' ? 'signup' : 'login')); // signup | login
  const [name, setName] = React.useState('');
  const [email, setEmail] = React.useState('');
  const [password, setPassword] = React.useState('');
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState('');
  const [needsConfirm, setNeedsConfirm] = React.useState(false);

  async function handleGoogle() {
    setError('');
    // M11 / S3: si la intención es suscribirse, guardá la bandera antes del redirect OAuth.
    // Usamos un marcador especial 'oauth-pending' porque en este punto aún no conocemos
    // el email que el usuario va a usar en Google. El riesgo de cruce entre usuarios es bajo
    // (el flujo OAuth es inmediato, sin días de espera) pero usamos un prefijo distinto
    // para que no se confunda con el flujo de confirmación de email.
    if (intent === 'subscribe') {
      try { localStorage.setItem('edm_pending_subscribe', 'oauth-pending'); } catch(e) {}
    }
    const { error: err } = await sb.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.origin },
    });
    if (err) setError(traducirError(err.message)); // M8
  }

  async function handleSubmit() {
    setError('');
    // M10: validación de formato email
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!email || !emailRegex.test(email)) { setError('Ingresá un email válido.'); return; }
    if (!password) { setError('Completá la contraseña.'); return; }
    // M10: validación de contraseña mínima en signup
    if (mode === 'signup' && password.length < 6) { setError('La contraseña debe tener al menos 6 caracteres.'); return; }
    setLoading(true);
    if (mode === 'signup') {
      const { data, error: err } = await sb.auth.signUp({
        email, password, options: { data: { name } },
      });
      setLoading(false);
      if (err) { setError(traducirError(err.message)); return; } // M8
      if (!data.session) {
        // Supabase requiere confirmación de email: guardamos la intención si era suscribirse.
        // S3: guardamos el email del usuario para que, al confirmar, la suscripción
        // solo se aplique a quien se registró con ese email (no a otro usuario en la misma compu).
        if (intent === 'subscribe') {
          try { localStorage.setItem('edm_pending_subscribe', email); } catch(e) {}
        }
        setNeedsConfirm(true);
        return;
      }
      onAuthed(intent === 'subscribe');
    } else {
      const { error: err } = await sb.auth.signInWithPassword({ email, password });
      setLoading(false);
      if (err) { setError(traducirError(err.message)); return; } // M8
      onAuthed(false);
    }
  }

  if (needsConfirm) {
    return (
      <Modal onClose={onClose}>
        <div className="p-8 text-center">
          <p className="text-4xl mb-4">📬</p>
          <h3 className="font-serif text-2xl font-semibold text-sea-900 mb-3">Confirmá tu email</h3>
          <p className="text-sea-600 mb-6">Te enviamos un email para confirmar tu cuenta a {email}. Confirmalo y después volvé acá para iniciar sesión{intent === 'subscribe' ? ' y activar tu suscripción' : ''}.</p>
          <button onClick={onClose} className="btn btn-primary btn-block">Entendido</button>
        </div>
      </Modal>
    );
  }

  return (
    <Modal onClose={onClose}>
      <div className="p-8">
        <h3 className="font-serif text-2xl font-semibold text-sea-900 mb-1">
          {mode === 'signup' ? (intent === 'subscribe' ? 'Sumate a Estado del Mar' : 'Creá tu cuenta') : 'Iniciá sesión'}
        </h3>
        {mode === 'signup' && intent === 'subscribe' && (
          <p className="text-xs text-amber-600 bg-amber-50 border border-amber-200 rounded-xl px-3 py-2 mb-6">
            Modo demo: la suscripción se activa directamente, todavía sin pasarela de pago real.
          </p>
        )}
        {mode === 'signup' && intent !== 'subscribe' && (
          <p className="text-sea-500 text-sm mb-6">Creá tu cuenta gratis — suscribirte para desbloquear el contenido es un paso aparte, cuando quieras.</p>
        )}

        {GOOGLE_LOGIN_ENABLED && (
          <div className="mt-2 mb-2">
            <button onClick={handleGoogle} className="w-full flex items-center justify-center gap-3 border-2 border-mist-200 bg-white rounded-full py-2.5 font-semibold text-sea-800 hover:border-mist-300 hover:bg-mist-50 hover:-translate-y-0.5 active:scale-[.98] transition-all duration-200">
              <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
                <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.3-.4-3.5z"/>
                <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.1 19 12 24 12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
                <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35.1 26.7 36 24 36c-5.2 0-9.6-3.3-11.3-7.9l-6.5 5C9.6 39.6 16.2 44 24 44z"/>
                <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.2-4.1 5.6l6.2 5.2C39.9 36.7 44 31 44 24c0-1.3-.1-2.3-.4-3.5z"/>
              </svg>

            <div className="flex items-center gap-3 my-4">

        {/* M9: <form> para que Enter envíe el formulario */}

function ProfileDrawer({ email, profile, subscribed, subscribeDate, isAdmin, subscribing, onSave, onSubscribe, onCancelSubscription, onSignOut, onOpenAdmin, onClose }) {

  const [city, setCity] = React.useState((profile && profile.city) || '');
  const [birthDate, setBirthDate] = React.useState((profile && profile.birth_date) || '');
  const [motivation, setMotivation] = React.useState((profile && profile.motivation) || '');
  const [confirming, setConfirming] = React.useState(false);
  const [saving, setSaving] = React.useState(false);
  const [savedMsg, setSavedMsg] = React.useState('');

  const drawerRef = React.useRef(null);
  useFocusTrap(drawerRef); // M7: focus trap en el drawer

  // M7: ref al onClose para no re-suscribir el listener en cada render
  const onCloseRef = React.useRef(onClose);
  React.useEffect(() => { onCloseRef.current = onClose; }, [onClose]);

  // M6: captura el overflow original UNA sola vez al montar; lo restaura al desmontar
  React.useEffect(() => {
    const prevOverflow = document.body.style.overflow;
    document.body.style.overflow = 'hidden';
    return () => { document.body.style.overflow = prevOverflow; };
  }, []);

  // M6/M7: listener de Escape separado, usa ref para no re-suscribir
  React.useEffect(() => {
    const onKey = e => { if (e.key === 'Escape') onCloseRef.current(); };
    window.addEventListener('keydown', onKey);
    return () => { window.removeEventListener('keydown', onKey); };
  }, []);

  async function handleSave() {
    setSaving(true);

  return (

// Sube un archivo al bucket "media" de Supabase Storage y devuelve la URL pública.
async function uploadMedia(file, prefix) {
  try {
    const ext = (file.name.split('.').pop() || 'bin').toLowerCase();
    const path = (prefix || 'archivo') + '/' + Date.now() + '-' + Math.random().toString(36).slice(2, 8) + '.' + ext;
    const { error } = await sb.storage.from('media').upload(path, file, { cacheControl: '3600', upsert: false });
    if (error) return { error: error.message };
    const { data } = sb.storage.from('media').getPublicUrl(path);
    return { url: data.publicUrl };
  } catch (e) {
    return { error: String(e) };
  }
}

// Campo reutilizable para subir un archivo (video o audio) desde el navegador.
function MediaUploader({ label, accept, prefix, value, onChange, hint, kind }) {
  const [uploading, setUploading] = React.useState(false);
  const [err, setErr] = React.useState('');
  const [mediaError, setMediaError] = React.useState(false);
  const inputRef = React.useRef(null);

  // Resetear el error de media si cambia la URL
  React.useEffect(() => { setMediaError(false); }, [value]);

  async function handleFile(e) {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    // A5: validar tamaño (máx 45 MB)
    const MAX_BYTES = 45 * 1024 * 1024;
    if (file.size > MAX_BYTES) {
      setErr('El archivo supera 45 MB. Subí uno más liviano.');
      if (inputRef.current) inputRef.current.value = '';
      return;
    }
    // A5: validar tipo según el kind esperado (video o audio)
    if (kind === 'video' && !file.type.startsWith('video/')) {
      setErr('El archivo no es un video válido. Usá un archivo mp4 u otro formato de video.');
      if (inputRef.current) inputRef.current.value = '';
      return;
    }
    if (kind === 'audio' && !file.type.startsWith('audio/')) {
      setErr('El archivo no es un audio válido. Usá un archivo mp3 u otro formato de audio.');
      if (inputRef.current) inputRef.current.value = '';
      return;
    }
    setErr(''); setUploading(true);
    const res = await uploadMedia(file, prefix);
    setUploading(false);
    if (res.error) { setErr('No se pudo subir: ' + res.error); return; }
    onChange(res.url);
    if (inputRef.current) inputRef.current.value = '';
  }

  return (
    <div>
      <label className="text-sm font-semibold text-sea-700 block mb-1">{label}</label>
      {value ? (
        <div className="mb-2 rounded-xl border border-mist-200 bg-mist-50 p-3">
          {mediaError ? (
            <p className="text-sm text-red-600 py-2">No se pudo cargar el archivo. Verificá que se haya subido bien.</p>
          ) : kind === 'video'
            ? <video src={value} controls className="w-full rounded-lg max-h-52 bg-black" onError={() => setMediaError(true)}></video>
            : <audio src={value} controls className="w-full" onError={() => setMediaError(true)}></audio>}
          <div className="flex items-center gap-3 mt-2">
            <span className="text-xs text-mist-700 font-semibold">{mediaError ? 'Error al cargar' : 'Archivo cargado ✓'}</span>
            <button onClick={() => { onChange(''); setMediaError(false); }} className="btn-link text-xs text-red-500 hover:text-red-700">Quitar</button>
          </div>
        </div>
      ) : null}
      <input ref={inputRef} type="file" accept={accept} onChange={handleFile}
        className="block w-full text-sm text-sea-600 file:mr-3 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-mist-100 file:text-mist-700 file:font-semibold hover:file:bg-mist-200 file:cursor-pointer cursor-pointer" />
      {uploading && <p className="text-sm text-mist-600 mt-1 animate-fadein">Subiendo archivo… no cierres esta ventana.</p>}
      {err && <p className="text-sm text-red-600 mt-1">{err}</p>}
      {hint && <p className="text-xs text-sea-400 mt-1">{hint}</p>}
    </div>
  );
}

// F10: filas memoizadas para reducir re-renders al tipear en listas con muchos ítems.
// Cada fila solo se re-renderiza si cambia SU valor o SUS handlers (que son useCallback estables).

const FilaPaso = React.memo(function FilaPaso({ valor, indice, total, onChange, onSubir, onBajar, onQuitar }) {
  return (
    <div className="flex items-center gap-3 rounded-xl border border-mist-100 bg-mist-50/40 px-4 py-3">
      <span className="text-xs font-bold text-mist-500 w-5 shrink-0 text-right">{indice + 1}.</span>

        placeholder={"Paso " + (indice + 1)}
      />
      <div className="flex items-center gap-1 shrink-0">
        <button onClick={() => onSubir(indice)} disabled={indice === 0} title="Subir paso" className="btn btn-sm btn-ghost px-2 disabled:opacity-30">▲</button>
        <button onClick={() => onBajar(indice)} disabled={indice === total - 1} title="Bajar paso" className="btn btn-sm btn-ghost px-2 disabled:opacity-30">▼</button>
        <button onClick={() => onQuitar(indice)} title="Quitar este paso" className="btn btn-sm px-3 py-1 bg-coral-100 text-coral-700 hover:bg-coral-200 rounded-lg text-xs font-semibold">Quitar</button>
      </div>
    </div>
  );
});

const FilaPregunta = React.memo(function FilaPregunta({ texto, indice, total, onChange, onSubir, onBajar, onQuitar }) {
  return (
    <div className="flex items-center gap-3 rounded-xl border border-mist-100 bg-mist-50/40 px-4 py-3">
      <span className="text-xs font-bold text-mist-500 w-5 shrink-0 text-right">{indice + 1}.</span>
      <input
        value={texto}
        onChange={e => onChange(indice, e.target.value)}
        className="flex-1 min-w-0 border border-mist-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-mist-400 focus:ring-2 focus:ring-mist-100 transition-all"
        placeholder={"Pregunta " + (indice + 1)}
      />
      <div className="flex items-center gap-1 shrink-0">
        <button onClick={() => onSubir(indice)} disabled={indice === 0} title="Subir pregunta" className="btn btn-sm btn-ghost px-2 disabled:opacity-30">▲</button>
        <button onClick={() => onBajar(indice)} disabled={indice === total - 1} title="Bajar pregunta" className="btn btn-sm btn-ghost px-2 disabled:opacity-30">▼</button>
        <button onClick={() => onQuitar(indice)} title="Quitar esta pregunta" className="btn btn-sm px-3 py-1 bg-coral-100 text-coral-700 hover:bg-coral-200 rounded-lg text-xs font-semibold">Quitar</button>
      </div>
    </div>
  );
});

function TopicEditForm({ topic, onSave, onCancel }) {
  const isNew = !topic;

  // ── Hooks al tope (regla React) ──────────────────────────────────────────
  const [title, setTitle] = React.useState(topic ? topic.title : '');
  // N6: si el emoji guardado no está en la lista de presets, lo mostramos en el campo personalizado
  const topicEmoji = topic ? topic.emoji : EMOJI_PRESETS[0];
  const [emoji, setEmoji] = React.useState(EMOJI_PRESETS.includes(topicEmoji) ? topicEmoji : EMOJI_PRESETS[0]);
  const [emojiCustom, setEmojiCustom] = React.useState(EMOJI_PRESETS.includes(topicEmoji) ? '' : topicEmoji);
  const [gradient, setGradient] = React.useState(topic ? topic.gradient : GRADIENT_PRESETS[0]);
  const [description, setDescription] = React.useState(topic ? topic.description : '');

  // Diapositivas — array de objetos { title, text, ...camposExtra }
  // N5: guardamos el objeto completo para no perder campos adicionales al guardar
  const [slides, setSlides] = React.useState(() =>
    (topic && Array.isArray(topic.slides) && topic.slides.length)
      ? topic.slides.map(s => ({ ...s, title: s.title || '', text: s.text || '' }))
      : []
  );

  // Meditación
  const [medTitle, setMedTitle] = React.useState(topic?.meditation?.title || '');
  const [medDuration, setMedDuration] = React.useState(topic?.meditation?.duration || '6 min');
  const [medDescription, setMedDescription] = React.useState(topic?.meditation?.description || '');

  // Ejercicio
  const [exerciseTitle, setExerciseTitle] = React.useState(topic?.exercise?.title || '');

  // Pasos del ejercicio — array de strings
  const [steps, setSteps] = React.useState(() =>
    (topic && Array.isArray(topic?.exercise?.steps)) ? [...topic.exercise.steps] : []
  );

  // Media
  const [videoUrl, setVideoUrl] = React.useState((topic && topic.video_url) || '');
  const [audioUrl, setAudioUrl] = React.useState((topic && topic.audio_url) || '');

  // Preguntas — array de objetos { text }
  const [questions, setQuestions] = React.useState(() =>
    (topic && Array.isArray(topic.questions) && topic.questions.length)
      ? topic.questions.map(q => ({ text: q.text || '' }))
      : []
  );

  // Niveles
  const baseLevels = (topic && topic.levels && topic.levels.length) ? topic.levels : makeDefaultLevels();
  const [levels, setLevels] = React.useState(baseLevels.map(l => ({ ...l })));

  // A8: valores iniciales para detectar cambios sin guardar
  const initialRef = React.useRef({
    title: topic ? topic.title : '',
    emoji: topic ? topic.emoji : EMOJI_PRESETS[0],
    gradient: topic ? topic.gradient : GRADIENT_PRESETS[0],
    description: topic ? topic.description : '',
    slides: JSON.stringify(
      (topic && Array.isArray(topic.slides) && topic.slides.length)
        ? topic.slides.map(s => ({ title: s.title || '', text: s.text || '' }))
        : []
    ),
    medTitle: topic?.meditation?.title || '',
    medDuration: topic?.meditation?.duration || '6 min',
    medDescription: topic?.meditation?.description || '',
    exerciseTitle: topic?.exercise?.title || '',
    steps: JSON.stringify(
      (topic && Array.isArray(topic?.exercise?.steps)) ? [...topic.exercise.steps] : []
    ),
    videoUrl: (topic && topic.video_url) || '',
    audioUrl: (topic && topic.audio_url) || '',
    questions: JSON.stringify(
      (topic && Array.isArray(topic.questions) && topic.questions.length)
        ? topic.questions.map(q => ({ text: q.text || '' }))
        : []
    ),
    levels: JSON.stringify(baseLevels.map(l => ({ ...l }))),
  });

  // ── Helpers reutilizables para listas ────────────────────────────────────

  // Sube un ítem una posición
  function moverArriba(setter, arr, i) {
    if (i === 0) return;
    const copia = [...arr];
    [copia[i - 1], copia[i]] = [copia[i], copia[i - 1]];
    setter(copia);
  }

  // Baja un ítem una posición
  function moverAbajo(setter, arr, i) {
    if (i === arr.length - 1) return;
    const copia = [...arr];
    [copia[i], copia[i + 1]] = [copia[i + 1], copia[i]];
    setter(copia);
  }

  // Quita un ítem por índice
  function quitar(setter, arr, i) {
    setter(arr.filter((_, idx) => idx !== i));
  }

  // ── Niveles ──────────────────────────────────────────────────────────────
  function setLevelField(i, field, val) {
    setLevels(ls => ls.map((l, idx) => idx === i ? { ...l, [field]: val } : l));
  }

  // F10: callbacks estables para FilaPaso y FilaPregunta (evitan re-renders en cadena)
  const handleStepChange = React.useCallback((idx, val) => {
    setSteps(prev => prev.map((x, i) => i === idx ? val : x));
  }, []);
  const handleStepSubir = React.useCallback((idx) => {
    setSteps(prev => { if (idx === 0) return prev; const c = [...prev]; [c[idx-1], c[idx]] = [c[idx], c[idx-1]]; return c; });
  }, []);
  const handleStepBajar = React.useCallback((idx) => {
    setSteps(prev => { if (idx === prev.length - 1) return prev; const c = [...prev]; [c[idx], c[idx+1]] = [c[idx+1], c[idx]]; return c; });
  }, []);
  const handleStepQuitar = React.useCallback((idx) => {
    setSteps(prev => prev.filter((_, i) => i !== idx));
  }, []);

  const handleQuestionChange = React.useCallback((idx, val) => {
    setQuestions(prev => prev.map((x, i) => i === idx ? { text: val } : x));
  }, []);
  const handleQuestionSubir = React.useCallback((idx) => {
    setQuestions(prev => { if (idx === 0) return prev; const c = [...prev]; [c[idx-1], c[idx]] = [c[idx], c[idx-1]]; return c; });
  }, []);
  const handleQuestionBajar = React.useCallback((idx) => {
    setQuestions(prev => { if (idx === prev.length - 1) return prev; const c = [...prev]; [c[idx], c[idx+1]] = [c[idx+1], c[idx]]; return c; });
  }, []);
  const handleQuestionQuitar = React.useCallback((idx) => {
    setQuestions(prev => prev.filter((_, i) => i !== idx));
  }, []);

  // ── A8: detectar cambios sin guardar ────────────────────────────────────
  function isDirty() {
    const init = initialRef.current;
    return title !== init.title || emoji !== init.emoji || gradient !== init.gradient ||
      description !== init.description ||
      JSON.stringify(slides) !== init.slides ||
      medTitle !== init.medTitle || medDuration !== init.medDuration || medDescription !== init.medDescription ||
      exerciseTitle !== init.exerciseTitle ||
      JSON.stringify(steps) !== init.steps ||
      videoUrl !== init.videoUrl || audioUrl !== init.audioUrl ||
      JSON.stringify(questions) !== init.questions ||
      JSON.stringify(levels) !== init.levels;
  }

  function handleCancel() {
    if (isDirty()) {
      const ok = confirm('Tenés cambios sin guardar. ¿Querés descartarlos?');
      if (!ok) return;
    }
    onCancel();
  }

  const inp = "w-full border border-mist-200 rounded-xl px-4 py-2.5 focus:outline-none focus:border-mist-400 focus:ring-4 focus:ring-mist-100 transition-all";

  // ── handleSave ────────────────────────────────────────────────────────────
  function handleSave() {
    if (!title.trim()) {
      alert('El título no puede estar vacío.');
      return;
    }

    // Slides: descartá los totalmente vacíos (sin título Y sin texto)
    // N5: spread del objeto original para preservar campos adicionales
    const finalSlides = slides.filter(s => s.title.trim() || s.text.trim())
      .map(s => ({ ...s, title: s.title, text: s.text }));

    // Steps: descartá strings vacíos
    const finalSteps = steps.map(s => s.trim()).filter(Boolean);

    // Questions: descartá los de texto vacío
    const filteredQuestions = questions.map(q => ({ text: q.text.trim() })).filter(q => q.text);
    // N3/X1: ventana nueva sin preguntas → quiz por defecto; ventana existente → respetar vacío intencional
    const finalQuestions = filteredQuestions.length
      ? filteredQuestions
      : (topic ? [] : makeDefaultQuiz(title || 'este tema'));

    // Advertencia si todo el contenido queda vacío
    const contenidoVacio = finalSlides.length === 0 && finalSteps.length === 0 && finalQuestions.length === 0;
    if (contenidoVacio) {
      const ok = confirm('Esta ventana quedaría sin diapositivas, sin pasos de ejercicio y sin preguntas. ¿Querés guardarla igual?');
      if (!ok) return;
    }

    // Partimos del topic real para no pisar campos no editados
    const base = topic || { id: slugify(title), questions: makeDefaultQuiz(title || 'este tema'), levels: makeDefaultLevels(), sort_order: 0 };

    // F4: Emoji — si el admin escribió uno personalizado, tiene prioridad.
    // Nos quedamos solo con el primer grapheme visible para evitar que un emoji largo
    // o compuesto desborde los círculos de la UI.
    const rawEmoji = emojiCustom.trim() || emoji;
    let emojiFinal = rawEmoji;
    try {
      if (rawEmoji && typeof Intl !== 'undefined' && Intl.Segmenter) {
        const seg = new Intl.Segmenter();
        const [first] = seg.segment(rawEmoji);
        if (first) emojiFinal = first.segment;
      } else if (rawEmoji) {
        // Fallback: tomar el primer punto de código (puede ser el surrogate pair de un emoji)
        emojiFinal = [...rawEmoji].slice(0, 2).join('');
      }
    } catch(e) { emojiFinal = rawEmoji; }

    const updated = {
      ...base,
      title: title.trim(), emoji: emojiFinal, gradient, description,
      slides: finalSlides,
      meditation: { title: medTitle, duration: medDuration, description: medDescription },
      exercise: { title: exerciseTitle, steps: finalSteps },
      questions: finalQuestions,
      levels: levels,
      video_url: videoUrl || null,
      audio_url: audioUrl || null,
      sort_order: (base.sort_order != null ? base.sort_order : 0),
    };
    onSave(updated);
  }

  // ── Render ────────────────────────────────────────────────────────────────
  return (
    <div className="bg-white rounded-3xl border border-mist-100 p-6 md:p-10 space-y-8 max-w-3xl mx-auto">
      <h3 className="font-serif text-2xl text-sea-900">{isNew ? 'Nueva ventana' : 'Editar ventana: ' + topic.title}</h3>

      {/* Básicos */}
      <div className="space-y-5">
        <p className="text-xs font-bold uppercase tracking-widest text-mist-500">Básicos</p>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label className="text-sm font-semibold text-sea-700 block mb-1">Título</label>
            <input value={title} onChange={e => setTitle(e.target.value)} className={inp} placeholder="Ej: Autoestima" />
          </div>
          <div>
            <label className="text-sm font-semibold text-sea-700 block mb-1">Ícono (emoji)</label>
            <div className="flex gap-2 items-center">
              <select value={emoji} onChange={e => { setEmoji(e.target.value); setEmojiCustom(''); }} className={inp}>
                {EMOJI_PRESETS.map(em => <option key={em} value={em}>{em}</option>)}
              </select>
              <input
                value={emojiCustom}
                onChange={e => setEmojiCustom(e.target.value)}
                className="border border-mist-200 rounded-xl px-3 py-2.5 w-24 text-center text-xl focus:outline-none focus:border-mist-400 focus:ring-4 focus:ring-mist-100 transition-all"
                placeholder="otro"
                title="Escribí aquí un emoji que no esté en la lista"
                maxLength={8}
              />
            </div>
            {emojiCustom.trim() && (
              <p className="text-xs text-sea-400 mt-1">Se usará el emoji personalizado: <strong>{emojiCustom.trim()}</strong></p>
            )}
          </div>
        </div>
        <div>
          <label className="text-sm font-semibold text-sea-700 block mb-2">Color</label>
          <div className="flex flex-wrap gap-2">
            {GRADIENT_PRESETS.map(g => (
              <button key={g} onClick={() => setGradient(g)}
                className={"w-10 h-10 rounded-full bg-gradient-to-br " + g + " border-2 transition-transform hover:scale-110 " + (gradient === g ? "border-sea-900 scale-110" : "border-white")}>
              </button>
            ))}
          </div>
        </div>
        <div>
          <label className="text-sm font-semibold text-sea-700 block mb-1">Descripción corta</label>
          <textarea value={description} onChange={e => setDescription(e.target.value)} rows="2" className={inp} />
        </div>
      </div>

      {/* Media */}
      <div className="border-t border-mist-100 pt-7 space-y-4">
        <p className="text-xs font-bold uppercase tracking-widest text-mist-500 mb-1">Video y audio</p>
        <MediaUploader
          label="Video de la ventana"
          accept="video/*"
          prefix="videos"
          kind="video"
          value={videoUrl}
          onChange={setVideoUrl}
          hint="Subí un archivo de video (mp4 recomendado). Ojo: el plan gratis de Supabase es limitado para video — ideal videos cortos o pocos. Para una videoteca grande conviene Bunny Stream."
        />
        <MediaUploader
          label="Audio de la meditación (opcional)"
          accept="audio/*"
          prefix="audios"
          kind="audio"
          value={audioUrl}
          onChange={setAudioUrl}
          hint="Subí el audio real de la meditación (mp3). Si lo dejás vacío, se usa el reproductor de ejemplo."
        />
      </div>

      {/* Check-in — Preguntas */}
      <div className="border-t border-mist-100 pt-7 space-y-6">
        <p className="text-xs font-bold uppercase tracking-widest text-mist-500">Check-in (diagnóstico)</p>
        <div>
          <label className="text-sm font-semibold text-sea-700 block mb-1">Preguntas del diagnóstico</label>
          <p className="text-xs text-sea-400 mb-3">Cada pregunta se responde con: Nunca / A veces / Frecuentemente / Casi siempre. Los rangos de resultado se recalculan solos según la cantidad de preguntas.</p>
          <div className="space-y-2">
            {questions.map((q, i) => (
              <FilaPregunta
                key={i}
                texto={q.text}
                indice={i}
                total={questions.length}
                onChange={handleQuestionChange}
                onSubir={handleQuestionSubir}
                onBajar={handleQuestionBajar}
                onQuitar={handleQuestionQuitar}
              />
            ))}
          </div>
          <button
            onClick={() => setQuestions([...questions, { text: '' }])}
            className="mt-4 btn btn-ghost text-sm border border-mist-200 hover:bg-mist-50"
          >+ Agregar pregunta</button>
        </div>

        {/* Niveles de resultado */}
        <div>
          <label className="text-sm font-semibold text-sea-700 block mb-2">Resultados según el puntaje</label>
          {/* F1: aviso si hay más niveles que puntajes posibles */}
          {questions.length > 0 && levels.length > questions.length * 3 + 1 && (
            <div className="mb-3 bg-sand-100 border border-sand-200 rounded-xl px-4 py-3 text-sm text-sea-700">
              Tenés más niveles que puntajes posibles; algunos no se van a poder alcanzar. Agregá preguntas o quitá niveles.
            </div>
          )}
          <div className="space-y-3">
            {(() => {
              const qCount = questions.length;
              const dynLevels = (qCount > 0 && levels.length > 0) ? computeDynamicLevels(levels, qCount) : levels;
              return levels.map((lv, i) => {
                const dl = dynLevels[i] || lv;
                return (
                  <div key={i} className="rounded-xl border border-mist-100 p-4 bg-mist-50/50">
                    <div className="flex items-center justify-between mb-3">
                      <p className="text-xs font-bold text-mist-600">
                        Nivel {i + 1} — Puntaje {dl.min}–{dl.max}
                        {qCount > 0 ? ' (según ' + qCount + ' pregunta' + (qCount !== 1 ? 's' : '') + ')' : ''}
                      </p>
                      <div className="flex items-center gap-1">
                        <button
                          onClick={() => moverArriba(setLevels, levels, i)}
                          disabled={i === 0}
                          title="Subir nivel"
                          className="btn btn-sm btn-ghost px-2 disabled:opacity-30 text-xs"
                        >▲</button>
                        <button
                          onClick={() => moverAbajo(setLevels, levels, i)}
                          disabled={i === levels.length - 1}
                          title="Bajar nivel"
                          className="btn btn-sm btn-ghost px-2 disabled:opacity-30 text-xs"
                        >▼</button>
                        <button
                          onClick={() => levels.length > 2 ? quitar(setLevels, levels, i) : alert('Debe haber al menos 2 niveles de resultado.')}
                          title="Quitar este nivel"
                          className="btn btn-sm px-3 py-1 bg-coral-100 text-coral-700 hover:bg-coral-200 rounded-lg text-xs font-semibold"
                        >Quitar</button>
                      </div>
                    </div>
                    <input value={lv.label} onChange={e => setLevelField(i, 'label', e.target.value)} className={inp + " mb-2"} placeholder="Título del resultado (ej: Marea calma)" />
                    <textarea value={lv.message} onChange={e => setLevelField(i, 'message', e.target.value)} rows="2" className={inp} placeholder="Mensaje para la persona" />
                  </div>
                );
              });
            })()}
          </div>
          <button
            onClick={() => setLevels([...levels, { label: '', message: '' }])}
            className="mt-4 btn btn-ghost text-sm border border-mist-200 hover:bg-mist-50"
          >+ Agregar nivel</button>
        </div>
      </div>

      {/* Contenido — Diapositivas */}
      <div className="border-t border-mist-100 pt-7 space-y-6">
        <p className="text-xs font-bold uppercase tracking-widest text-mist-500">Contenido</p>
        <div>
          <label className="text-sm font-semibold text-sea-700 block mb-2">Diapositivas</label>
          <div className="space-y-3">
            {slides.map((s, i) => (
              <div key={i} className="rounded-xl border border-mist-100 bg-mist-50/40 p-4 space-y-3">
                <div className="flex items-center justify-between">
                  <span className="text-xs font-bold text-mist-500">Diapositiva {i + 1}</span>
                  <div className="flex items-center gap-1">
                    <button
                      onClick={() => moverArriba(setSlides, slides, i)}
                      disabled={i === 0}
                      title="Subir diapositiva"
                      className="btn btn-sm btn-ghost px-2 disabled:opacity-30 text-xs"
                    >▲</button>
                    <button
                      onClick={() => moverAbajo(setSlides, slides, i)}
                      disabled={i === slides.length - 1}
                      title="Bajar diapositiva"
                      className="btn btn-sm btn-ghost px-2 disabled:opacity-30 text-xs"
                    >▼</button>
                    <button
                      onClick={() => quitar(setSlides, slides, i)}
                      title="Quitar esta diapositiva"
                      className="btn btn-sm px-3 py-1 bg-coral-100 text-coral-700 hover:bg-coral-200 rounded-lg text-xs font-semibold"
                    >Quitar</button>
                  </div>
                </div>
                <input
                  value={s.title}
                  onChange={e => setSlides(slides.map((x, idx) => idx === i ? { ...x, title: e.target.value } : x))}
                  className={inp}
                  placeholder="Título de la diapositiva"
                />
                <textarea
                  value={s.text}
                  onChange={e => setSlides(slides.map((x, idx) => idx === i ? { ...x, text: e.target.value } : x))}
                  rows="3"
                  className={inp}
                  placeholder="Texto de la diapositiva"
                />
              </div>
            ))}
          </div>
          <button
            onClick={() => setSlides([...slides, { title: '', text: '' }])}
            className="mt-4 btn btn-ghost text-sm border border-mist-200 hover:bg-mist-50"
          >+ Agregar diapositiva</button>
        </div>

        <div>
          <p className="text-sm font-semibold text-sea-700 mb-3">Meditación</p>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div>
              <label className="text-sm font-semibold text-sea-700 block mb-1">Título</label>
              <input value={medTitle} onChange={e => setMedTitle(e.target.value)} className={inp} />
            </div>
            <div>
              <label className="text-sm font-semibold text-sea-700 block mb-1">Duración</label>
              <input value={medDuration} onChange={e => setMedDuration(e.target.value)} className={inp} placeholder="6 min" />
            </div>
            <div>
              <label className="text-sm font-semibold text-sea-700 block mb-1">Descripción</label>
              <input value={medDescription} onChange={e => setMedDescription(e.target.value)} className={inp} />
            </div>
          </div>
        </div>

        <div>
          <label className="text-sm font-semibold text-sea-700 block mb-1">Título del ejercicio</label>
          <input value={exerciseTitle} onChange={e => setExerciseTitle(e.target.value)} className={inp} />
        </div>

        {/* Pasos del ejercicio */}
        <div>
          <label className="text-sm font-semibold text-sea-700 block mb-2">Pasos del ejercicio</label>
          <div className="space-y-2">
            {steps.map((s, i) => (
              <FilaPaso
                key={i}
                valor={s}
                indice={i}
                total={steps.length}
                onChange={handleStepChange}
                onSubir={handleStepSubir}
                onBajar={handleStepBajar}
                onQuitar={handleStepQuitar}
              />
            ))}
          </div>
          <button
            onClick={() => setSteps([...steps, ''])}
            className="mt-4 btn btn-ghost text-sm border border-mist-200 hover:bg-mist-50"
          >+ Agregar paso</button>
        </div>
      </div>

      <div className="flex gap-3 pt-4 border-t border-mist-100">
        {/* M2: deshabilitado visualmente cuando el título está vacío */}
        <button onClick={handleSave} disabled={!title.trim()} className="btn btn-primary disabled:opacity-40 disabled:cursor-not-allowed">Guardar ventana</button>
        <button onClick={handleCancel} className="btn btn-ghost">Cancelar</button>
      </div>
    </div>
  );
}

// B10: AdminPanel recibe waNumber/waMsg/onSaveWhatsapp para configurar WhatsApp desde el panel
function AdminPanel({ topics, price, setPrice, onSavePrice, priceError, waNumber, waMsg, onSaveWhatsapp, onExit, onSaveTopic, onDeleteTopic, onSeedInitial, onReorder, reordering }) {
  const [editingId, setEditingId] = React.useState(null);
  const [creating, setCreating] = React.useState(false);
  const [saving, setSaving] = React.useState(false);
  const [seeding, setSeeding] = React.useState(false);
  const [savingPrice, setSavingPrice] = React.useState(false);
  const [priceSaved, setPriceSaved] = React.useState(false);
  // B10: estado local para editar WhatsApp
  const [localWaNumber, setLocalWaNumber] = React.useState(waNumber || '');
  const [localWaMsg, setLocalWaMsg] = React.useState(waMsg || '');
  const [savingWa, setSavingWa] = React.useState(false);
  const [waSaved, setWaSaved] = React.useState(false);
  const [waError, setWaError] = React.useState('');

  async function saveTopic(updated) {
    // M1: si es creación (no hay editingId), verificar que el slug no colisione con una ventana existente
    if (creating && !editingId) {
      const colision = topics.some(t => t.id === updated.id);
      if (colision) {
        alert('Ya existe una ventana con ese nombre. Elegí un título distinto.');
        return;
      }
    }
    setSaving(true);
    await onSaveTopic(updated);
    setSaving(false);
    setEditingId(null);
    setCreating(false);
  }

  async function deleteTopic(id) {
    if (confirm('¿Eliminar esta ventana? Esta acción no se puede deshacer.')) {
      await onDeleteTopic(id);
    }
  }

  async function seedInitial() {
    setSeeding(true);
    await onSeedInitial();
    setSeeding(false);
  }

  const editingTopic = topics.find(t => t.id === editingId);

  return (
    <div className="min-h-screen bg-sand-50">
      <div className="bg-gradient-to-r from-mist-500 to-sea-600 text-white">
        <div className="max-w-5xl mx-auto px-6 py-8 flex items-center justify-between">

            <h1 className="font-serif text-3xl font-semibold">Panel de administración</h1>

          </div>
          <button onClick={onExit} className="btn-link text-white/90 hover:text-white text-sm font-semibold">Salir →</button>
        </div>
      </div>

      <div className="max-w-5xl mx-auto px-6 py-10 space-y-10">
        <div className="bg-white rounded-3xl border border-sea-100 p-6 md:p-8">
          <h3 className="font-serif text-xl text-sea-900 mb-4">Configuración general</h3>
          <label className="text-sm font-semibold text-sea-700 block mb-1">Precio de la suscripción mensual</label>
          <div className="flex items-center gap-2 max-w-xs">
            <span className="text-sea-500">$</span>
            <input value={price} onChange={e => { setPrice(e.target.value); setPriceSaved(false); }} className="w-full border border-mist-200 rounded-xl px-4 py-2.5 focus:outline-none focus:border-mist-400 focus:ring-4 focus:ring-mist-100 transition-all" />
            <span className="text-sea-500">/mes</span>
          </div>
          <div className="mt-3 flex items-center gap-3">
            <button
              disabled={savingPrice}
              onClick={async () => {
                setSavingPrice(true);
                setPriceSaved(false);
                const ok = await onSavePrice(price);
                setSavingPrice(false);
                if (ok) setPriceSaved(true);
              }}
              className="btn btn-primary btn-sm"
            >
              {savingPrice ? 'Guardando…' : 'Guardar precio'}
            </button>
            {priceSaved && <span className="text-sm text-green-600 font-semibold">Precio guardado ✓</span>}
          </div>
          {priceError && <p className="text-sm text-red-600 mt-2">{priceError}</p>}

          {/* B10: configuración de WhatsApp */}
          <div className="mt-6 pt-6 border-t border-mist-100 space-y-3">
            <p className="font-serif text-base text-sea-900 mb-2">Contacto por WhatsApp</p>
            <div>
              <label className="text-sm font-semibold text-sea-700 block mb-1">Número de WhatsApp</label>
              <input
                value={localWaNumber}
                onChange={e => { setLocalWaNumber(e.target.value); setWaSaved(false); }}
                className="w-full border border-mist-200 rounded-xl px-4 py-2.5 focus:outline-none focus:border-mist-400 focus:ring-4 focus:ring-mist-100 transition-all"
                placeholder="Ej: 5492235125610 (sin + ni espacios)"
              />
              <p className="text-xs text-sea-400 mt-1">Ingresá el número completo sin el signo + ni espacios. Ejemplo: 5492235125610</p>
            </div>
            <div>

                placeholder="Ej: Hola, vengo del sitio Estado del Mar..."
              />
            </div>
            <div className="flex items-center gap-3">
              <button
                disabled={savingWa}
                onClick={async () => {
                  setSavingWa(true);
                  setWaSaved(false);
                  setWaError('');

                    <button onClick={() => onReorder(i, 1)} disabled={i === topics.length - 1 || reordering} title="Bajar" className="w-7 h-7 rounded-lg bg-mist-50 text-sea-600 hover:bg-mist-100 disabled:opacity-30 disabled:cursor-not-allowed flex items-center justify-center text-xs transition-colors">▼</button>
                  </div>
                  <div className={"w-12 h-12 rounded-full bg-gradient-to-br " + (t.gradient || DEFAULT_GRADIENT) + " flex items-center justify-center text-xl flex-shrink-0"}>{t.emoji}</div>

                    <div className="flex items-center gap-2 flex-wrap">

}

  const [subscribing, setSubscribing] = React.useState(false);

  const [reordering, setReordering] = React.useState(false);

  React.useEffect(() => {
    sb.auth.getSession().then(({ data }) => {
      setSession(data.session);

      // la activamos automáticamente SOLO si el email guardado coincide con el del usuario que acaba de
      // loguearse. Esto evita que la bandera se aplique a otro usuario en la misma computadora.
      // El caso 'oauth-pending' se aplica sin restricción de email (flujo OAuth inmediato sin delay).
      if (newSession && newSession.user) {
        try {
          const pending = localStorage.getItem('edm_pending_subscribe');
          if (pending) {
            // Siempre limpiamos la bandera para no dejarla colgada
            localStorage.removeItem('edm_pending_subscribe');
            const aplicar = pending === 'oauth-pending' || pending === newSession.user.email;
            if (aplicar) {
              sb.from('profiles').upsert({ id: newSession.user.id, subscribed: true, subscribed_at: new Date().toISOString() }).then(({ error }) => {
                if (!error) setProfile(p => ({ ...(p || { id: newSession.user.id }), subscribed: true, subscribed_at: new Date().toISOString() }));
              });
            }
          }
        } catch(e) {}
      }
    });
    return () => listener.subscription.unsubscribe();
  }, []);

  // B11: dependencia en user.id (no en el objeto session completo) para evitar refetch en cada TOKEN_REFRESHED
  React.useEffect(() => {
    const userId = session && session.user ? session.user.id : null;
    if (!userId) { setProfile(null); return; }
    sb.from('profiles').select('*').eq('id', userId).single().then(({ data, error }) => {
      if (!error) setProfile(data);
      // Si hay error de red, simplemente no cargamos perfil; no bloqueamos la app
    }).catch(() => {});
  }, [session && session.user ? session.user.id : null]);

  React.useEffect(() => {
    // Cargamos las ventanas de la base. Si la base todavía no tiene ninguna
    // (tabla vacía) o hay error de red, dejamos las INITIAL_TOPICS de ejemplo,
    // así el sitio NUNCA se ve sin ventanas.
    sb.from('topics').select('*').order('sort_order', { ascending: true }).order('created_at', { ascending: true }).then(({ data, error }) => {
      if (!error && data && data.length > 0) {
        // F11: re-secuenciar sort_order en memoria (0..n-1) según el orden ya resuelto por la query,
        // para evitar colisiones o valores raros que generarían orden ambiguo en el estado local.
        const topicsLimpios = data.map((t, idx) => ({ ...t, sort_order: idx }));
        setTopics(topicsLimpios);
      }
    }).catch(() => {});
  }, []);

  // Cargar precio y config de WhatsApp desde app_config (si la tabla existe); si no, mantiene los valores por defecto
  React.useEffect(() => {
    sb.from('app_config').select('price,whatsapp,whatsapp_msg').eq('id', 'main').single().then(({ data, error }) => {
      if (!error && data) {
        if (data.price) setPrice(data.price);
        if (data.whatsapp) setWaNumber(data.whatsapp);
        if (data.whatsapp_msg) setWaMsg(data.whatsapp_msg);
      }
      // Si la tabla no existe todavía, simplemente mantenemos los valores por defecto sin error
    }).catch(() => {});
  }, []);

  React.useEffect(() => {
    if (view === 'home' && pendingScroll) {
      const el = document.getElementById(pendingScroll);
      if (el) el.scrollIntoView({ behavior: 'smooth' });
      setPendingScroll(null);
    }
  }, [view, pendingScroll]);

  // F7: si estamos en 'detail' pero el topic ya no existe (fue borrado o aún no cargó),
  // navegamos a home desde un effect para nunca llamar setState durante el render.
  React.useEffect(() => {
    if (view === 'detail' && activeTopicId && !topics.find(t => t.id === activeTopicId)) {
      setView('home');
      setActiveTopicId(null);
      window.scrollTo(0, 0);
    }
  }, [view, activeTopicId, topics]);

  // M5: helper para cerrar overlays al navegar
  function closeOverlays() { setShowProfile(false); setShowAuthModal(false); }

  function goHome() { closeOverlays(); setView('home'); setActiveTopicId(null); window.scrollTo(0,0); }
  function selectTopic(id) { closeOverlays(); setActiveTopicId(id); setView('detail'); }
  function goToSection(sectionId) {
    closeOverlays();
    if (view === 'home') {
      const el = document.getElementById(sectionId);
      if (el) el.scrollIntoView({ behavior: 'smooth' });
    } else {
      setActiveTopicId(null);
      setPendingScroll(sectionId);
      setView('home');
    }
  }
  function openPage(pageId) {
    closeOverlays();
    setActiveTopicId(null);
    setView(pageId);
    window.scrollTo(0, 0);
  }

  async function markSubscribedForUser(userId) {
    const { error } = await sb.from('profiles').upsert({ id: userId, subscribed: true, subscribed_at: new Date().toISOString() });
    // S2: mostrar error en español al usuario, no solo en consola
    if (error) { console.error('Error al suscribir:', error.message); alert(traducirError(error.message)); return; }
    setProfile(p => ({ ...(p || { id: userId }), subscribed: true, subscribed_at: new Date().toISOString() }));
  }

  async function markSubscribed() {
    // A3: ignorar si ya hay una operación en curso
    if (subscribing) return;
    if (session && session.user) {
      setSubscribing(true);
      try { await markSubscribedForUser(session.user.id); } finally { setSubscribing(false); }
    }
  }

  async function cancelSubscription() {
    // A3: ignorar si ya hay una operación en curso
    if (subscribing) return;
    if (!session || !session.user) return;
    setSubscribing(true);
    try {
      const { error } = await sb.from('profiles').upsert({ id: session.user.id, subscribed: false });
      // S2: mostrar error en español al usuario, no solo en consola
      if (error) { console.error('Error al cancelar suscripción:', error.message); alert(traducirError(error.message)); return; }
      setProfile(p => ({ ...(p || {}), subscribed: false }));
    } finally {
      setSubscribing(false);
    }
  }

  async function signOutUser() {
    await sb.auth.signOut();
    goHome();
  }

  async function saveProfileFields(fields) {
    if (!session || !session.user) return { error: 'No hay sesión activa.' };
    const { error } = await sb.from('profiles').upsert({ id: session.user.id, ...fields });
    if (!error) setProfile(p => ({ ...(p || {}), ...fields }));
    return { error: error ? error.message : null };
  }

  function openSubscribeFlow() {
    // A3: ignorar si ya hay una operación en curso
    if (subscribing) return;
    if (session && session.user) {
      markSubscribed();
    } else {
      setAuthIntent('subscribe');
      setAuthInitialMode('signup');
      setShowAuthModal(true);
    }
  }

  function openAuthFlow() {
    setAuthIntent('account');
    setAuthInitialMode('login');
    setShowAuthModal(true);
  }

  function openRegisterFlow() {
    setAuthIntent('account');
    setAuthInitialMode('signup');
    setShowAuthModal(true);
  }

  async function handleAuthed(shouldSubscribe) {
    setShowAuthModal(false);
    if (!shouldSubscribe) return;
    const { data } = await sb.auth.getSession();
    if (data.session) await markSubscribedForUser(data.session.user.id);
  }

  async function saveTopicToDb(updated) {
    // sort_order es una columna integer (máx ~2.147.000.000): normalizamos para evitar
    // valores fuera de rango. Una ventana nueva (o con orden inválido) va al final.
    const INT_MAX = 2147483647;
    const exists = topics.some(t => t.id === updated.id);
    let orden = updated.sort_order;
    if (!exists || orden == null || !Number.isFinite(orden) || orden > INT_MAX || orden < 0) {
      const maxOrden = topics.reduce((m, t) => Math.max(m, Number.isFinite(t.sort_order) ? t.sort_order : 0), -1);
      orden = maxOrden + 1;
    }
    const fixed = { ...updated, sort_order: orden };
    const { error } = await sb.from('topics').upsert(fixed);
    if (error) { alert('No se pudo guardar: ' + traducirError(error.message)); return; } // M8
    setTopics(prev => {
      const yaExiste = prev.some(t => t.id === fixed.id);
      return yaExiste ? prev.map(t => t.id === fixed.id ? fixed : t) : [...prev, fixed];
    });
  }

  async function deleteTopicFromDb(id) {
    const { error } = await sb.from('topics').delete().eq('id', id);
    if (error) { alert('No se pudo eliminar: ' + traducirError(error.message)); return; } // M8
    setTopics(prev => prev.filter(t => t.id !== id));
  }

  async function reorderTopics(index, dir) {
    // A4: evitar tandas concurrentes
    if (reordering) return;
    const j = index + dir;
    if (j < 0 || j >= topics.length) return;

    const prevTopics = topics; // guardar para posible revert
    const arr = [...topics];
    const [moved] = arr.splice(index, 1);
    arr.splice(j, 0, moved);
    const withOrder = arr.map((t, idx) => ({ ...t, sort_order: idx }));
    setTopics(withOrder);
    setReordering(true);

    try {
      // N2: upsert batch atómico — o guarda todo o no guarda nada (evita orden parcial en caso de falla)
      const { error } = await sb.from('topics').upsert(withOrder);
      if (error) {
        setTopics(prevTopics);
        alert('No se pudo guardar el nuevo orden, intentá de nuevo.');
      }
    } finally {
      setReordering(false);
    }
  }

  async function savePriceToDb(newPrice) {
    setPriceError('');
    const { error } = await sb.from('app_config').upsert({ id: 'main', price: newPrice });
    if (error) {
      setPriceError('No se pudo guardar el precio: ' + traducirError(error.message)); // M8
      return false;
    }
    setPrice(newPrice);
    return true;
  }

  // B10: guardar número y mensaje de WhatsApp en app_config
  async function saveWhatsappToDb(number, msg) {
    const { error } = await sb.from('app_config').upsert({ id: 'main', whatsapp: number, whatsapp_msg: msg });
    if (error) return { ok: false, msg: 'No se pudo guardar: ' + traducirError(error.message) };
    setWaNumber(number);
    setWaMsg(msg);
    return { ok: true };
  }

  async function seedInitialTopics() {
    // N1: detectar qué ventanas de ejemplo faltan (sin pisar las ya editadas)
    const existingIds = new Set(topics.map(t => t.id));
    const faltantes = INITIAL_TOPICS.filter(t => !existingIds.has(t.id));

    if (faltantes.length === 0) {
      alert('Las ventanas iniciales ya están cargadas.');
      return;
    }

    const ok = confirm(
      'Se agregarán ' + faltantes.length + ' ventana(s) de ejemplo que aún no existen:\n' +
      faltantes.map(t => '• ' + (t.title || t.id)).join('\n') +
      '\n\nLas ventanas que ya editaste no se modificarán. ¿Continuar?'
    );
    if (!ok) return;

    // Asignar sort_order continuando desde el máximo actual
    const maxOrden = topics.reduce((m, t) => Math.max(m, Number.isFinite(t.sort_order) ? t.sort_order : 0), -1);
    const toInsert = faltantes.map((t, idx) => ({ ...t, sort_order: maxOrden + 1 + idx }));

    const { error } = await sb.from('topics').upsert(toInsert);
    if (error) { alert('No se pudo cargar el contenido inicial: ' + traducirError(error.message)); return; } // M8

    // Refrescar estado local con los topics recién insertados
    setTopics(prev => [...prev, ...toInsert]);
  }

  if (!authChecked) {
    return (
      <div className="min-h-screen flex items-center justify-center bg-sand-50">
        <p className="text-sea-400 text-sm">Cargando…</p>
      </div>
    );
  }

  const loggedIn = !!(session && session.user);
  const subscribed = !!(profile && profile.subscribed);
  const isAdmin = !!(profile && profile.is_admin);

  if (view === 'admin') {
    if (!isAdmin) {
      return (
        <div key="noaccess" className="view-anim min-h-screen flex items-center justify-center bg-sand-50 px-6 text-center">
          <div>
            <p className="text-4xl mb-4">🔒</p>
            <p className="text-sea-700 mb-4">No tenés acceso al panel de administración.</p>
            <button onClick={goHome} className="btn btn-ghost">Volver</button>
          </div>
        </div>
      );
    }
    return (
      <div key="admin" className="view-anim">
        <ErrorBoundary>
          <AdminPanel topics={topics} price={price} setPrice={setPrice} onSavePrice={savePriceToDb} priceError={priceError} waNumber={waNumber} waMsg={waMsg} onSaveWhatsapp={saveWhatsappToDb} onExit={goHome} onSaveTopic={saveTopicToDb} onDeleteTopic={deleteTopicFromDb} onSeedInitial={seedInitialTopics} onReorder={reorderTopics} reordering={reordering} />
        </ErrorBoundary>
      </div>
    );
  }

  // Overlays compartidos (drawer de cuenta + modal de auth) — disponibles en todas las vistas del sitio
  const overlays = (
    <React.Fragment>
      {loggedIn && showProfile && (
        <ProfileDrawer
          key={profile ? profile.id : 'noprofile'}
          email={session.user.email}
          profile={profile}
          subscribed={subscribed}
          subscribeDate={profile ? profile.subscribed_at : null}
          isAdmin={isAdmin}
          subscribing={subscribing}
          onSave={saveProfileFields}
          onSubscribe={markSubscribed}
          onCancelSubscription={cancelSubscription}
          onSignOut={() => { setShowProfile(false); signOutUser(); }}
          onOpenAdmin={() => { closeOverlays(); setView('admin'); }}
          onClose={() => setShowProfile(false)}
        />
      )}
      {showAuthModal && <AuthModal intent={authIntent} initialMode={authInitialMode} onClose={() => setShowAuthModal(false)} onAuthed={handleAuthed} />}
    </React.Fragment>
  );

  const headerEl = (
    <Header loggedIn={loggedIn} subscribed={subscribed} onNav={goHome} onNavigateSection={goToSection} onOpenPage={openPage} onOpenAuth={openAuthFlow} onOpenRegister={openRegisterFlow} onOpenAccount={() => setShowProfile(true)} onOpenSubscribe={openSubscribeFlow} />
  );

  if (view === 'sobre' || view === 'faq' || view === 'contacto') {
    return (
      <React.Fragment>
        {headerEl}
        <div key={view} className="view-anim">
          <ErrorBoundary>
            {view === 'sobre' && <SobrePage subscribed={subscribed} onOpenSubscribe={openSubscribeFlow} onOpenPage={openPage} />}
            {view === 'faq' && <FaqPage onOpenPage={openPage} />}
            {view === 'contacto' && <ContactoPage onOpenPage={openPage} waNumber={waNumber} waMsg={waMsg} />}
          </ErrorBoundary>
          <Footer onOpenAdmin={() => { closeOverlays(); setView('admin'); }} showAdminLink={isAdmin} onOpenPage={openPage} />
        </div>
        {overlays}
      </React.Fragment>
    );
  }

  if (view === 'detail') {
    const topic = topics.find(t => t.id === activeTopicId);
    // F7: si el topic no existe, el useEffect de arriba ya va a navegar a home.
    // Retornamos null sin llamar goHome() en el render (eso violaría las reglas de React).
    if (!topic) { return null; }
    return (
      <React.Fragment>
        {headerEl}
        <div key={'detail-' + topic.id} className="view-anim">
          <ErrorBoundary>
            <TopicDetail topic={topic} subscribed={subscribed} onBack={goHome} onOpenSubscribe={openSubscribeFlow} />
          </ErrorBoundary>
          <Footer onOpenAdmin={() => { closeOverlays(); setView('admin'); }} showAdminLink={isAdmin} onOpenPage={openPage} />
        </div>
        {overlays}
      </React.Fragment>
    );
  }

  return (
    <React.Fragment>
      {headerEl}
      <div key="home" className="view-anim">
        <ErrorBoundary>
          <Hero onOpenSubscribe={openSubscribeFlow} topics={topics} />
          <TopicsGrid topics={topics} subscribed={subscribed} onSelect={selectTopic} />
          <HowItWorks />
          <PricingSection price={price} subscribed={subscribed} onOpenSubscribe={openSubscribeFlow} onOpenPage={openPage} onGoWindows={() => goToSection('ventanas')} />
        </ErrorBoundary>
        <Footer onOpenAdmin={() => { closeOverlays(); setView('admin'); }} showAdminLink={isAdmin} onOpenPage={openPage} />
      </div>
      {overlays}
    </React.Fragment>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
